<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR Hand Player</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;}

/* 1. Камера — самый нижний слой */
#cam{
  position:fixed;inset:0;width:100%;height:100%;
  object-fit:cover;z-index:1;
}

/* 2. Canvas для видео-панели — рисуем drawImage каждый кадр */
#world{
  position:fixed;inset:0;width:100%;height:100%;
  z-index:2;pointer-events:none;
}

/* 3. Скелет руки */
#cv{
  position:fixed;inset:0;width:100%;height:100%;
  z-index:3;pointer-events:none;
}

/* 4. UI поверх всего */
#ui{position:fixed;inset:0;z-index:4;pointer-events:none;}

/* Курсор */
#cursor{
  position:fixed;z-index:5;pointer-events:none;
  width:20px;height:20px;border-radius:50%;
  border:2px solid #00ffcc;box-shadow:0 0 8px rgba(0,255,204,.8);
  transform:translate(-50%,-50%);display:none;
}

/* HUD */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:5;
  padding:12px 16px 8px;
  background:linear-gradient(180deg,rgba(0,0,0,.75)0%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;pointer-events:none;
}
#logo{color:#00ffcc;font-size:12px;letter-spacing:4px;font-weight:bold;}
#srow{display:flex;align-items:center;gap:7px;}
#dot{width:8px;height:8px;border-radius:50%;background:#444;}
#dot.on{background:#00ffcc;box-shadow:0 0 7px #00ffcc;}
#stxt{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px;}

#modebar{
  position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:5;
  background:rgba(0,0,0,.6);border:1px solid rgba(0,255,204,.3);
  border-radius:20px;padding:5px 14px;font-size:11px;color:#00ffcc;
  letter-spacing:2px;pointer-events:none;white-space:nowrap;
}

#hints{
  position:fixed;bottom:0;left:0;right:0;z-index:5;
  padding:10px 10px 16px;
  background:linear-gradient(0deg,rgba(0,0,0,.75)0%,transparent 100%);
  display:flex;flex-wrap:wrap;gap:6px;justify-content:center;pointer-events:none;
  transition:opacity .3s;
}
#hints.hidden{opacity:0;}
.h{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:4px 10px;font-size:10px;color:rgba(255,255,255,.5);}

/* Hold bar */
#holdbar{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:55vw;z-index:5;pointer-events:none;display:none;}
#holdtrack{height:4px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
#holdfill{height:100%;width:0%;border-radius:3px;}

/* Flash */
#flash{
  position:fixed;top:48%;left:50%;transform:translate(-50%,-50%);
  z-index:10;pointer-events:none;
  font-size:16px;font-weight:bold;letter-spacing:2px;
  opacity:0;transition:opacity .15s;text-align:center;line-height:1.8;
}
#flash.show{opacity:1;}

/* Hold ring */
#holdring{position:fixed;z-index:5;pointer-events:none;transform:translate(-50%,-50%);display:none;}

/* Scale indicator */
#scalebadge{
  position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
  z-index:5;pointer-events:none;
  background:rgba(0,0,0,.6);border:1px solid rgba(0,255,204,.3);
  border-radius:10px;padding:5px 12px;font-size:12px;color:#00ffcc;
  opacity:0;transition:opacity .2s;letter-spacing:1px;
}
#scalebadge.show{opacity:1;}

/* ── Overlays ── */
.overlay{
  position:fixed;inset:0;z-index:20;
  background:rgba(0,0,0,.82);backdrop-filter:blur(12px);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;
}
.overlay.show{display:flex;}

/* File pick */
#fp-title{font-size:16px;color:#00ffcc;letter-spacing:4px;}
#fp-sub{font-size:11px;color:rgba(255,255,255,.3);text-align:center;line-height:2;letter-spacing:1px;}
#fp-btn{
  background:rgba(0,255,204,.1);border:1.5px solid rgba(0,255,204,.5);
  color:#00ffcc;border-radius:30px;padding:14px 32px;
  font-size:13px;font-weight:bold;letter-spacing:3px;
  cursor:pointer;font-family:'Courier New',monospace;
}
#file-input{display:none;}

/* File list */
#fl-hdr{
  width:100%;padding:14px 18px 10px;
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:12px;color:#00ffcc;letter-spacing:3px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
#fl-sub{font-size:10px;color:rgba(255,255,255,.3);}
#fl-items{width:100%;flex:1;overflow-y:auto;padding:8px 0;-webkit-overflow-scrolling:touch;}
#fl-items::-webkit-scrollbar{display:none;}
.fli{
  display:flex;align-items:center;gap:14px;
  padding:20px 20px;margin:5px 10px;
  border-radius:14px;min-height:68px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  position:relative;overflow:hidden;
}
.fli.hover{border-color:rgba(0,255,204,.6);background:rgba(0,255,204,.07);}
.fli-icon{font-size:24px;flex-shrink:0;}
.fli-info{flex:1;min-width:0;}
.fli-name{font-size:14px;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fli-size{font-size:10px;color:rgba(255,255,255,.3);margin-top:3px;}
.fli-dwell{position:absolute;left:0;top:0;bottom:0;width:0%;background:rgba(0,255,204,.1);border-radius:14px;pointer-events:none;}
.fli-ring{width:40px;height:40px;flex-shrink:0;}
.fli-ring .rbg{stroke:rgba(255,255,255,.1);}
.fli-ring .rfg{stroke:#00ffcc;stroke-linecap:round;stroke-dasharray:100;stroke-dashoffset:100;transform:rotate(-90deg);transform-origin:50% 50%;}

/* Loading spinner */
#spinner{
  position:fixed;inset:0;z-index:25;
  background:rgba(0,0,0,.7);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
#spinner.show{display:flex;}
#spin-ring{width:44px;height:44px;border:3px solid rgba(0,255,204,.2);border-top-color:#00ffcc;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#spin-txt{font-size:11px;color:#00ffcc;letter-spacing:2px;}

/* Loader */
#loader{
  position:fixed;inset:0;z-index:100;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
#lt{font-size:24px;font-weight:bold;color:#00ffcc;letter-spacing:6px;text-shadow:0 0 30px #00ffcc;}
#ls{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:3px;}
#lb-o{width:200px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
#lb-i{height:100%;width:0%;background:#00ffcc;transition:width .3s;}
#lm{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1px;text-align:center;padding:0 24px;min-height:26px;}
#retry{display:none;background:#00ffcc;color:#000;border:none;padding:12px 26px;font-size:13px;font-weight:bold;letter-spacing:3px;border-radius:30px;cursor:pointer;font-family:'Courier New',monospace;}

.scan{position:fixed;left:0;right:0;height:1px;top:-1px;z-index:4;background:linear-gradient(90deg,transparent,rgba(0,255,204,.2),transparent);animation:scananim 4s linear infinite;pointer-events:none;}
@keyframes scananim{to{top:100vh;}}
</style>
</head>
<body>

<div id="loader">
  <div id="lt">AR HAND</div>
  <div id="ls">SPATIAL PLAYER</div>
  <div id="lb-o"><div id="lb-i"></div></div>
  <div id="lm">Загрузка…</div>
  <button id="retry" onclick="location.reload()">ПЕРЕЗАГРУЗИТЬ</button>
</div>

<!-- Слои снизу вверх -->
<video id="cam" playsinline autoplay muted></video>
<canvas id="world"></canvas>
<canvas id="cv"></canvas>
<div class="scan"></div>

<!-- UI -->
<div id="cursor"></div>
<svg id="holdring" width="54" height="54" viewBox="0 0 54 54">
  <circle cx="27" cy="27" r="23" fill="none" stroke="rgba(0,255,204,.15)" stroke-width="2"/>
  <circle id="harc" cx="27" cy="27" r="23" fill="none" stroke="#00ffcc" stroke-width="2.5"
    stroke-linecap="round" stroke-dasharray="144.5" stroke-dashoffset="144.5"
    transform="rotate(-90 27 27)"/>
</svg>

<div id="hud">
  <div id="logo">AR·HAND</div>
  <div id="srow"><div id="dot"></div><span id="stxt">…</span></div>
</div>
<div id="modebar">НАВЕДИ РУКУ</div>
<div id="hints">
  <div class="h">✌️ держи → файлы</div>
  <div class="h">✋ ладонь → размер</div>
  <div class="h">✌️ держи (играет) → переместить</div>
  <div class="h">✊ держи → пауза</div>
</div>
<div id="holdbar"><div id="holdtrack"><div id="holdfill"></div></div></div>
<div id="scalebadge">↔ 100%</div>
<div id="flash"></div>

<!-- Выбор файла -->
<div class="overlay" id="ov-pick">
  <div id="fp-title">◈ AR ВИДЕО</div>
  <div id="fp-sub">Выбери видео с телефона.<br>Оно зависнет в комнате поверх камеры.</div>
  <button id="fp-btn" onclick="document.getElementById('file-input').click()">＋ ВЫБРАТЬ ВИДЕО</button>
  <input id="file-input" type="file" accept="video/*" multiple>
</div>

<!-- Список файлов -->
<div class="overlay" id="ov-list" style="justify-content:flex-start;padding-top:0;">
  <div id="fl-hdr" style="align-self:stretch;">
    <span>◈ ВИДЕО</span>
    <span id="fl-sub">☝️ наведи и задержи</span>
  </div>
  <div id="fl-items" style="align-self:stretch;"></div>
</div>

<!-- Спиннер -->
<div id="spinner">
  <div id="spin-ring"></div>
  <div id="spin-txt">ЗАГРУЗКА…</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════════
// Архитектура:
// - cam       : задняя камера, CSS фон
// - world     : 2D canvas, на него drawImage видео каждый кадр
//               позиция вычисляется из гироскопа
// - cv        : 2D canvas, скелет руки
// - Three.js  : НЕ используется для рендера
//               используется только для математики (Vector3, Quaternion)
// ════════════════════════════════════════════════════════════════

var cam      = document.getElementById('cam');
var world    = document.getElementById('world');
var wctx     = world.getContext('2d');
var cv       = document.getElementById('cv');
var ctx      = cv.getContext('2d');
var cursor   = document.getElementById('cursor');
var holdring = document.getElementById('holdring');
var harc     = document.getElementById('harc');
var dot      = document.getElementById('dot');
var stxt     = document.getElementById('stxt');
var modebar  = document.getElementById('modebar');
var hb       = document.getElementById('holdbar');
var hf       = document.getElementById('holdfill');
var scalebadge = document.getElementById('scalebadge');
var loader   = document.getElementById('loader');
var lbI      = document.getElementById('lb-i');
var lmEl     = document.getElementById('lm');
var spinner  = document.getElementById('spinner');

function setLoad(p,m){ lbI.style.width=p+'%'; lmEl.textContent=m; }

function resize(){
  cv.width = world.width = window.innerWidth;
  cv.height= world.height= window.innerHeight;
}
window.addEventListener('resize',resize); resize();

// ── Flash ───────────────────────────────────────────────────────
var flt;
function flash(txt,col){
  var f=document.getElementById('flash');
  f.innerHTML=txt; f.style.color=col||'#00ffcc';
  f.style.textShadow='0 0 20px '+(col||'#00ffcc');
  f.classList.add('show'); clearTimeout(flt);
  flt=setTimeout(function(){f.classList.remove('show');},1800);
}

// ── Overlays ────────────────────────────────────────────────────
var currentMode = 'idle';

function showPick(){
  currentMode='pick';
  document.getElementById('ov-pick').classList.add('show');
  document.getElementById('ov-list').classList.remove('show');
  modebar.textContent='ВЫБЕРИ ФАЙЛ';
  document.getElementById('hints').classList.add('hidden');
}
function showList(){
  document.getElementById('ov-pick').classList.remove('show');
  document.getElementById('ov-list').classList.add('show');
  currentMode='list';
  modebar.textContent='☝️ НАВЕДИ НА ВИДЕО';
  document.getElementById('hints').classList.remove('hidden');
  buildList();
}
function hideAll(){
  document.getElementById('ov-pick').classList.remove('show');
  document.getElementById('ov-list').classList.remove('show');
}

// ── Файлы ───────────────────────────────────────────────────────
var files=[];

document.getElementById('file-input').addEventListener('change',function(e){
  Array.from(e.target.files).forEach(function(f){
    files.push({name:f.name, url:URL.createObjectURL(f), size:f.size});
  });
  this.value='';
  if(files.length) showList();
});

function fmtSz(b){ return b>1e6?(b/1e6).toFixed(1)+' МБ':(b/1e3).toFixed(0)+' КБ'; }

function buildList(){
  var el=document.getElementById('fl-items'); el.innerHTML='';
  files.forEach(function(f,i){
    var d=document.createElement('div');
    d.className='fli'; d.dataset.idx=i;
    d.innerHTML=
      '<div class="fli-dwell"></div>'+
      '<div class="fli-icon">🎬</div>'+
      '<div class="fli-info">'+
        '<div class="fli-name">'+esc(f.name)+'</div>'+
        '<div class="fli-size">'+(f.size?fmtSz(f.size):'')+'</div>'+
      '</div>'+
      '<svg class="fli-ring" viewBox="0 0 32 32">'+
        '<circle class="rbg" cx="16" cy="16" r="12" fill="none" stroke-width="2"/>'+
        '<circle class="rfg" cx="16" cy="16" r="12" fill="none" stroke-width="2.5"/>'+
      '</svg>';
    el.appendChild(d);
  });
}

// ── Видео-панель ────────────────────────────────────────────────
var panel = {
  active: false,
  el: null,           // HTMLVideoElement
  // Позиция в "мире" — углы гироскопа в момент размещения
  anchorYaw: 0,       // горизонтальный угол (alpha)
  anchorPitch: 0,     // вертикальный угол (beta)
  // Размер на экране при стандартном расстоянии
  baseW: 0,
  baseH: 0,
  scale: 1.0
};

// Текущие углы гироскопа (сглаженные)
var gyro = { yaw:0, pitch:0, ready:false };
var gyroRaw = { yaw:0, pitch:0 };
var gyroBase = null; // null = не установлена база

window.addEventListener('deviceorientationabsolute', onOri, true);
window.addEventListener('deviceorientation', onOri, true);

function onOri(e){
  if(e.alpha===null||e.alpha===undefined) return;
  gyroRaw.yaw   = e.alpha;   // 0-360
  gyroRaw.pitch = e.beta;    // -180..180
  gyro.ready = true;

  // Устанавливаем базу при первом чтении
  if(gyroBase===null){
    gyroBase={yaw:e.alpha, pitch:e.beta};
  }
}

function requestGyro(){
  if(typeof DeviceOrientationEvent!=='undefined'&&
     typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().catch(function(){});
  }
}

// Сглаженные значения обновляются в главном цикле
var SMOOTH = 0.1;
function updateGyroSmooth(){
  if(!gyroBase) return;
  // Дельта от базы
  var dyaw   = angleDiff(gyroRaw.yaw,   gyroBase.yaw);
  var dpitch = (gyroRaw.pitch - gyroBase.pitch);
  // Сглаживание
  gyro.yaw   += (dyaw   - gyro.yaw)   * SMOOTH;
  gyro.pitch += (dpitch - gyro.pitch) * SMOOTH;
}

function angleDiff(a,b){
  var d=a-b;
  while(d>180)  d-=360;
  while(d<-180) d+=360;
  return d;
}

// Загрузить видео и разместить
function loadVideo(idx){
  var f=files[idx];
  hideAll();
  spinner.classList.add('show');

  // Убиваем старое
  if(panel.el){ try{panel.el.pause();}catch(e){} panel.el.src=''; panel.el=null; }
  panel.active=false;

  var v=document.createElement('video');
  v.playsInline=true; v.loop=true; v.muted=true; v.preload='auto';

  var placed=false;
  function doPlace(){
    if(placed) return; placed=true;
    spinner.classList.remove('show');
    panel.el=v;

    var vw=v.videoWidth  || 1280;
    var vh=v.videoHeight || 720;
    var ar=vw/vh;

    // Базовый размер — 70% ширины экрана
    panel.baseW = window.innerWidth*0.70;
    panel.baseH = panel.baseW/ar;
    panel.scale = 1.0;

    // Якорь = текущий угол взгляда
    panel.anchorYaw   = gyro.yaw;
    panel.anchorPitch = gyro.pitch;
    panel.active      = true;

    currentMode='playing';
    modebar.textContent='✌️ держи → переместить';
    document.getElementById('hints').classList.remove('hidden');

    v.muted=false;
    v.play().catch(function(){ v.muted=true; v.play().catch(function(){}); });
    flash('▶ '+f.name.slice(0,20),'#00ffcc');
  }

  v.addEventListener('loadedmetadata', doPlace);
  v.addEventListener('canplay',        doPlace);
  setTimeout(doPlace, 2500); // страховка

  v.addEventListener('error',function(){
    spinner.classList.remove('show');
    flash('⚠ ОШИБКА: '+f.name,'#ff4444');
  });

  v.src=f.url; v.load();
}

// ── Рисуем панель на world canvas каждый кадр ─────────────────
// Принцип: панель "висит" в пространстве.
// Когда поворачиваем телефон на dYaw градусов,
// панель смещается на экране на dYaw * K пикселей.

var DEG_TO_PX_H = 18; // px на градус горизонталь
var DEG_TO_PX_V = 18; // px на градус вертикаль

function drawPanel(){
  wctx.clearRect(0,0,world.width,world.height);
  if(!panel.active||!panel.el) return;
  if(panel.el.readyState<2) return;

  // Смещение от якоря
  var dYaw   = gyro.yaw   - panel.anchorYaw;
  var dPitch = gyro.pitch - panel.anchorPitch;

  // Центр экрана + смещение
  var cx = world.width/2  - dYaw   * DEG_TO_PX_H;
  var cy = world.height/2 - dPitch * DEG_TO_PX_V;

  var pw = panel.baseW * panel.scale;
  var ph = panel.baseH * panel.scale;
  var px = cx - pw/2;
  var py = cy - ph/2;

  // Тень
  wctx.save();
  wctx.shadowColor='rgba(0,0,0,0.7)';
  wctx.shadowBlur=30;
  wctx.fillStyle='rgba(0,0,0,0.01)';
  wctx.beginPath(); rrect(wctx,px-4,py-4,pw+8,ph+8,14); wctx.fill();
  wctx.restore();

  // Видео кадр
  wctx.save();
  wctx.beginPath(); rrect(wctx,px,py,pw,ph,12); wctx.clip();
  try{ wctx.drawImage(panel.el, px, py, pw, ph); }catch(e){}
  wctx.restore();

  // Рамка
  wctx.save();
  wctx.strokeStyle='rgba(0,255,204,0.4)';
  wctx.lineWidth=1.5;
  wctx.shadowColor='rgba(0,255,204,0.3)'; wctx.shadowBlur=6;
  wctx.beginPath(); rrect(wctx,px,py,pw,ph,12); wctx.stroke();
  wctx.restore();

  // Тайтл-бар
  wctx.save();
  wctx.fillStyle='rgba(0,0,0,.6)';
  wctx.beginPath(); rrect(wctx,px,py,pw,26,{tl:12,tr:12,bl:0,br:0}); wctx.fill();
  wctx.fillStyle='rgba(255,255,255,.5)';
  wctx.font='10px Courier New'; wctx.textBaseline='middle';
  wctx.fillText('▶ '+(panel.el.paused?'⏸ ':'')+(files[currentFileIdx]||{name:''}).name.slice(0,36), px+10, py+13);
  wctx.restore();
}

var currentFileIdx=0;

function rrect(c,x,y,w,h,r){
  if(typeof r==='number') r={tl:r,tr:r,bl:r,br:r};
  c.beginPath();
  c.moveTo(x+r.tl,y);
  c.lineTo(x+w-r.tr,y); c.arcTo(x+w,y,x+w,y+r.tr,r.tr);
  c.lineTo(x+w,y+h-r.br); c.arcTo(x+w,y+h,x+w-r.br,y+h,r.br);
  c.lineTo(x+r.bl,y+h); c.arcTo(x,y+h,x,y+h-r.bl,r.bl);
  c.lineTo(x,y+r.tl); c.arcTo(x,y,x+r.tl,y,r.tl);
  c.closePath();
}

// ── Скелет ──────────────────────────────────────────────────────
var FC=['#ff9933','#00ffcc','#33ddff','#bb66ff','#ff55aa'];
var FSEG=[
  {s:[[0,1],[1,2],[2,3],[3,4]],c:'#ff9933'},
  {s:[[0,5],[5,6],[6,7],[7,8]],c:'#00ffcc'},
  {s:[[5,9],[9,10],[10,11],[11,12]],c:'#33ddff'},
  {s:[[9,13],[13,14],[14,15],[15,16]],c:'#bb66ff'},
  {s:[[13,17],[17,18],[18,19],[19,20]],c:'#ff55aa'}
];
var PALM=[[0,17],[5,9],[9,13],[13,17]];
var TIPS=[4,8,12,16,20], MCPS=[1,5,9,13,17];

function pt(lms,i){ return{x:lms[i].x*cv.width, y:lms[i].y*cv.height}; }
function dst(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }

function drawHand(lms,gest){
  ctx.clearRect(0,0,cv.width,cv.height);
  // glow
  ctx.save(); ctx.globalAlpha=0.1; ctx.lineCap='round';
  FSEG.forEach(function(f){
    ctx.strokeStyle=f.c; ctx.lineWidth=12; ctx.shadowColor=f.c; ctx.shadowBlur=20;
    f.s.forEach(function(ab){
      var pa=pt(lms,ab[0]),pb=pt(lms,ab[1]);
      ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
    });
  }); ctx.restore();
  // palm
  ctx.save(); ctx.lineCap='round';
  PALM.forEach(function(ab){
    var pa=pt(lms,ab[0]),pb=pt(lms,ab[1]);
    ctx.strokeStyle='rgba(0,255,200,.15)'; ctx.lineWidth=0.7; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
  });
  // bones
  FSEG.forEach(function(f){
    f.s.forEach(function(ab){
      var pa=pt(lms,ab[0]),pb=pt(lms,ab[1]);
      ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.lineWidth=1.2; ctx.shadowBlur=0;
      ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
      ctx.strokeStyle=f.c; ctx.lineWidth=0.7; ctx.shadowColor=f.c; ctx.shadowBlur=4;
      ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
    });
  }); ctx.restore();
  // joints
  ctx.save();
  for(var i=0;i<21;i++){
    var p=pt(lms,i);
    var col=i<=4?FC[0]:i<=8?FC[1]:i<=12?FC[2]:i<=16?FC[3]:FC[4];
    if(TIPS.indexOf(i)>=0){
      ctx.shadowColor=col; ctx.shadowBlur=16; ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=0.8; ctx.shadowBlur=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,7,0,Math.PI*2); ctx.stroke();
    } else if(i===0){
      ctx.strokeStyle=col; ctx.lineWidth=1.1; ctx.shadowColor=col; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(p.x,p.y,6,0,Math.PI*2); ctx.stroke();
      ctx.lineWidth=0.5; ctx.beginPath(); ctx.arc(p.x,p.y,10,0,Math.PI*2); ctx.stroke();
    } else if(MCPS.indexOf(i)>=0){
      ctx.strokeStyle=col; ctx.lineWidth=1; ctx.shadowColor=col; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='rgba(0,0,0,.35)';
      ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=3; ctx.globalAlpha=0.8;
      ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
    }
  }
  if(gest==='PINCH'){
    var t=pt(lms,4),ix=pt(lms,8);
    ctx.strokeStyle='#ff4444'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.shadowColor='#ff4444'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.moveTo(t.x,t.y); ctx.lineTo(ix.x,ix.y); ctx.stroke();
  }
  ctx.restore();
}

// ── Жесты ───────────────────────────────────────────────────────
function fUp(lms,tip,dip,mcp){
  var w=lms[0]; var d=function(p){return Math.hypot(p.x-w.x,p.y-w.y);};
  return d(lms[tip])>d(lms[dip])&&d(lms[tip])>d(lms[mcp]);
}
function getG(lms){
  var i=fUp(lms,8,7,5),m=fUp(lms,12,11,9),r=fUp(lms,16,15,13),p=fUp(lms,20,19,17);
  var pinch=dst(lms[4],lms[8])<0.08;
  if(!i&&!m&&!r&&!p) return 'FIST';
  if(i&&m&&r&&p)     return 'OPEN';
  if(i&&m&&!r&&!p)   return 'PEACE';
  if(i&&!m&&!r&&!p&&pinch) return 'PINCH';
  if(i&&!m&&!r&&!p)  return 'POINT';
  return 'OTHER';
}

// ── Масштаб ─────────────────────────────────────────────────────
var scaleRef=null, scaleRefVal=1.0, scaleBadgeTimer=null;
function doScale(lms){
  var t=lms[4],p=lms[20];
  var s=Math.hypot(t.x-p.x,t.y-p.y);
  if(scaleRef===null){ scaleRef=s; scaleRefVal=panel.scale; return; }
  if(scaleRef<0.01) return;
  panel.scale=Math.max(0.0001, scaleRefVal*(s/scaleRef));
  scalebadge.textContent='↔ '+Math.round(panel.scale*100)+'%';
  scalebadge.classList.add('show');
  clearTimeout(scaleBadgeTimer);
  scaleBadgeTimer=setTimeout(function(){scalebadge.classList.remove('show');},800);
}

// ── Dwell ────────────────────────────────────────────────────────
var dwellTgt=null, dwellT=0, DWELL=1000;
function doDwell(fx,fy){
  if(currentMode!=='list') return;
  var items=document.querySelectorAll('.fli'); var hit=null;
  items.forEach(function(el){
    var r=el.getBoundingClientRect();
    if(fx>=r.left-20&&fx<=r.right+20&&fy>=r.top-20&&fy<=r.bottom+20) hit=el;
  });
  if(hit){
    items.forEach(function(el){
      if(el!==hit){
        el.classList.remove('hover');
        el.querySelector('.fli-dwell').style.width='0%';
        el.querySelector('.rfg').style.strokeDashoffset='100';
      }
    });
    hit.classList.add('hover');
    if(dwellTgt!==hit){ dwellTgt=hit; dwellT=Date.now(); }
    var pct=Math.min(1,(Date.now()-dwellT)/DWELL);
    hit.querySelector('.fli-dwell').style.width=(pct*100)+'%';
    hit.querySelector('.rfg').style.strokeDashoffset=(100*(1-pct))+'';
    if(pct>=1){
      var idx=parseInt(hit.dataset.idx);
      dwellTgt=null;
      currentFileIdx=idx;
      loadVideo(idx);
    }
  } else {
    if(dwellTgt){
      dwellTgt.querySelector('.fli-dwell').style.width='0%';
      dwellTgt.querySelector('.rfg').style.strokeDashoffset='100';
      dwellTgt.classList.remove('hover');
      dwellTgt=null;
    }
  }
}

// ── Hold ─────────────────────────────────────────────────────────
var holdG='',holdT=0,lastTrig=0,HOLD=750;
function doHold(g,fx,fy){
  var now=Date.now();
  if(g==='OPEN') return;
  if(g!==holdG){ holdG=g; holdT=now; hideRing(); hb.style.display='none'; return; }
  var held=now-holdT;
  var need=(g==='PEACE')||(g==='FIST'&&currentMode==='playing');
  if(need&&held>80){
    var pct=Math.min(1,held/HOLD);
    showRing(fx,fy,pct);
    if(g==='FIST'){ hb.style.display='block'; hf.style.background='#ff6633'; hf.style.boxShadow='0 0 8px #ff6633'; hf.style.width=(pct*100)+'%'; }
  } else { hideRing(); hb.style.display='none'; }
  if(held>=HOLD&&now-lastTrig>1500){
    lastTrig=now; holdT=now; hideRing(); hb.style.display='none';
    if(g==='PEACE'){
      if(currentMode==='idle'||currentMode==='pick'||currentMode==='list') showPick();
      else if(currentMode==='playing'){
        // Переместить — обновляем якорь
        panel.anchorYaw=gyro.yaw;
        panel.anchorPitch=gyro.pitch;
        flash('📌 ПЕРЕМЕЩЕНО','#00ffcc');
      }
    }
    if(g==='FIST'&&currentMode==='playing'){
      if(panel.el){
        if(panel.el.paused) panel.el.play().catch(function(){});
        else panel.el.pause();
        flash(panel.el.paused?'⏸ ПАУЗА':'▶ ИГРАЕТ','#00ffcc');
      }
    }
  }
}
function showRing(x,y,pct){
  holdring.style.display='block'; holdring.style.left=x+'px'; holdring.style.top=y+'px';
  harc.style.strokeDashoffset=(144.5*(1-pct))+'';
}
function hideRing(){ holdring.style.display='none'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── MediaPipe ────────────────────────────────────────────────────
var hands;
function initHands(){
  hands=new Hands({locateFile:function(f){
    return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/'+f;
  }});
  hands.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:0.6,minTrackingConfidence:0.5});
  hands.onResults(function(res){
    ctx.clearRect(0,0,cv.width,cv.height);
    if(res.multiHandLandmarks&&res.multiHandLandmarks.length>0){
      var lms=res.multiHandLandmarks[0];
      var g=getG(lms);
      drawHand(lms,g);
      if(g==='OPEN'&&currentMode==='playing') doScale(lms);
      else scaleRef=null;
      var tip=pt(lms,8);
      cursor.style.display='block'; cursor.style.left=tip.x+'px'; cursor.style.top=tip.y+'px';
      cursor.style.borderColor=g==='PINCH'?'#ff4444':'#00ffcc';
      doDwell(tip.x,tip.y);
      doHold(g,tip.x,tip.y);
      dot.className='on'; stxt.textContent=g;
    } else {
      ctx.clearRect(0,0,cv.width,cv.height);
      cursor.style.display='none'; hideRing(); hb.style.display='none';
      dot.className=''; stxt.textContent='НЕТ РУКИ'; holdG=''; scaleRef=null;
      if(dwellTgt){ dwellTgt.querySelector('.fli-dwell').style.width='0%'; dwellTgt.querySelector('.rfg').style.strokeDashoffset='100'; dwellTgt=null; }
    }
  });
}

// Главный цикл
function startMainLoop(){
  var lastHand=0;
  function loop(ts){
    requestAnimationFrame(loop);
    // Гироскоп
    updateGyroSmooth();
    // Рисуем панель
    drawPanel();
    // Рука — не чаще 20fps
    if(ts-lastHand>=50&&cam.readyState>=2&&!cam.paused){
      lastHand=ts;
      hands.send({image:cam}).catch(function(){});
    }
  }
  requestAnimationFrame(loop);
}

// ── Boot ─────────────────────────────────────────────────────────
(async function(){
  try{
    setLoad(20,'Загрузка MediaPipe…');
    initHands();
    setLoad(50,'Загрузка модели рук…');
    await hands.initialize();

    setLoad(78,'Включение камеры…');
    var stream=null;
    var opts=[
      {video:{facingMode:{exact:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false},
      {video:{facingMode:'environment'},audio:false},
      {video:true,audio:false}
    ];
    for(var i=0;i<opts.length;i++){
      try{ stream=await navigator.mediaDevices.getUserMedia(opts[i]); break; }
      catch(e){ if(i===opts.length-1) throw new Error('Камера недоступна'); }
    }
    cam.srcObject=stream;
    await new Promise(function(r){ cam.onloadedmetadata=function(){ cam.play().then(r); }; });

    setLoad(100,'Готово!');
    requestGyro();

    setTimeout(function(){
      loader.style.display='none';
      startMainLoop();
      setTimeout(showPick,300);
    },300);

  }catch(err){
    setLoad(0,'Ошибка: '+err.message);
    lmEl.style.color='#ff6666';
    dot.className='err';
    document.getElementById('retry').style.display='block';
    console.error(err);
  }
})();
</script>
