<!DOCTYPE html>
<html>
<head>
    <title>Моё MAX-облако</title>
    <meta charset="utf-8">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px; 
            background: #f0f2f5; 
        }
        h1 { 
            color: #2688eb; 
            text-align: center;
        }
        .description {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .upload-box { 
            background: white; 
            border: 2px dashed #2688eb; 
            padding: 40px; 
            text-align: center; 
            border-radius: 10px; 
            margin: 20px 0; 
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-box:hover {
            background: #f0f8ff;
            border-color: #1a6eb8;
        }
        .upload-box p {
            margin: 10px 0;
            font-size: 18px;
            color: #333;
        }
        .file-list { 
            margin-top: 30px; 
        }
        .file-item { 
            background: white; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-info {
            flex-grow: 1;
        }
        .file-name {
            font-weight: bold;
            color: #2688eb;
            text-decoration: none;
            font-size: 16px;
        }
        .file-name:hover {
            text-decoration: underline;
        }
        .file-size {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        .file-date {
            color: #999;
            font-size: 12px;
        }
        button { 
            background: #2688eb; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 6px; 
            font-size: 16px; 
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { 
            background: #1a6eb8; 
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }
        .success {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>☁️ Моё MAX-облако</h1>
    <div class="description">
        Файлы хранятся в MAX/VK • Лимит 4 ГБ на файл • Безопасно и бесплатно
    </div>
    
    <!-- Сообщения для пользователя -->
    <div id="message"></div>
    
    <!-- Область загрузки -->
    <div class="upload-box" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <p>📁 Нажми, чтобы выбрать файл (до 4 ГБ)</p>
        <p style="font-size: 14px; color: #999;">или перетащи файл сюда</p>
        <input type="file" id="fileInput" style="display: none;">
    </div>
    
    <!-- Список файлов -->
    <div class="file-list" id="fileList">
        <h3>📄 Загрузка списка файлов...</h3>
    </div>
    
    <script>
        // =============================================
        // ВСТАВЬ СВОЙ ТОКЕН СЮДА (между кавычек)
        // =============================================
        const VK_TOKEN = 'vk1.a.r1EMRoy8jxXaDeBj7ZfD3fNDPhnJ-yQSUUP4TlOT_TM6eE39tB-xfJihwOf5oefW9F-CwWIsZE8L7T6Eth3Kuy_5m6D6CNf-8N-Va1eFk0j8yVR2XOKvlvcv7GZtssaqvOoeQrMktBnmGXH4ONxLRgRuvl8qzyVF0lYee3T9j0rQ7VCOUjd_RvOH_SXk_izijYXtRZHHZ55TDFs8Lmpe6w';
        
        // Функция для показа сообщений
        function showMessage(text, type = 'info') {
            const messageDiv = document.getElementById('message');
            if (type === 'error') {
                messageDiv.innerHTML = `<div class="error">❌ ${text}</div>`;
            } else if (type === 'success') {
                messageDiv.innerHTML = `<div class="success">✅ ${text}</div>`;
            }
            setTimeout(() => {
                messageDiv.innerHTML = '';
            }, 5000);
        }
        
        // Загружаем список файлов при открытии страницы
        window.onload = function() {
            loadFileList();
        };
        
        // Обработка перетаскивания файлов
        const dropZone = document.getElementById('dropZone');
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.background = '#e3f2fd';
        });
        
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.background = 'white';
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.background = 'white';
            const file = e.dataTransfer.files[0];
            if (file) uploadFile(file);
        });
        
        // Загрузка файла при выборе через кнопку
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) uploadFile(file);
        });
        
        // Функция загрузки файла
        async function uploadFile(file) {
            // Проверяем размер (4 ГБ = 4 * 1024 * 1024 * 1024 байт)
            if (file.size > 4 * 1024 * 1024 * 1024) {
                showMessage('Файл больше 4 ГБ! MAX не примет.', 'error');
                return;
            }
            
            showMessage('⏳ Загружаем файл... Это может занять время', 'info');
            
            try {
                // Получаем ссылку для загрузки
                const serverResponse = await fetch(`https://api.vk.com/method/docs.getUploadServer?type=doc&access_token=${VK_TOKEN}&v=5.131`);
                const serverData = await serverResponse.json();
                
                if (serverData.error) {
                    showMessage('Ошибка: ' + serverData.error.error_msg, 'error');
                    return;
                }
                
                const uploadUrl = serverData.response.upload_url;
                
                // Создаём форму с файлом
                const formData = new FormData();
                formData.append('file', file);
                
                // Загружаем на сервер VK
                const uploadResponse = await fetch(uploadUrl, {
                    method: 'POST',
                    body: formData
                });
                const uploadData = await uploadResponse.json();
                
                // Сохраняем файл в документах
                const saveResponse = await fetch(`https://api.vk.com/method/docs.save?file=${uploadData.file}&access_token=${VK_TOKEN}&v=5.131`);
                const saveData = await saveResponse.json();
                
                if (saveData.response) {
                    showMessage('Файл успешно загружен в MAX!', 'success');
                    loadFileList(); // Обновляем список
                } else {
                    showMessage('Ошибка при сохранении файла', 'error');
                }
                
            } catch (error) {
                showMessage('Ошибка: ' + error.message, 'error');
            }
            
            // Очищаем input, чтобы можно было загрузить тот же файл снова
            document.getElementById('fileInput').value = '';
        }
        
        // Загружаем список файлов
        async function loadFileList() {
            const listDiv = document.getElementById('fileList');
            listDiv.innerHTML = '<h3>📄 Загрузка списка файлов...</h3>';
            
            try {
                const response = await fetch(`https://api.vk.com/method/docs.get?access_token=${VK_TOKEN}&v=5.131`);
                const data = await response.json();
                
                if (data.error) {
                    listDiv.innerHTML = `<h3>❌ Ошибка: ${data.error.error_msg}</h3>`;
                    return;
                }
                
                const files = data.response.items;
                
                if (files.length === 0) {
                    listDiv.innerHTML = '<h3>📄 У тебя пока нет файлов в MAX</h3><p>Загрузи первый файл через форму выше!</p>';
                    return;
                }
                
                let html = '<h3>📄 Мои файлы:</h3>';
                files.forEach(file => {
                    const sizeMB = (file.size / 1024 / 1024).toFixed(2);
                    const date = new Date(file.date * 1000).toLocaleString();
                    
                    html += `
                        <div class="file-item">
                            <div class="file-info">
                                <a href="${file.url}" class="file-name" target="_blank">${file.title}</a>
                                <div class="file-size">${sizeMB} МБ</div>
                                <div class="file-date">Добавлен: ${date}</div>
                            </div>
                        </div>
                    `;
                });
                
                listDiv.innerHTML = html;
                
            } catch (error) {
                listDiv.innerHTML = `<h3>❌ Ошибка: ${error.message}</h3>`;
            }
        }
    </script>
</body>
</html>
