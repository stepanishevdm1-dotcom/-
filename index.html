<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Liquid Glass Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ЖИДКИЙ ФОН С НЕЙРОСЕТЯМИ */
        .ai-background {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, #4f46e5, transparent 40%),
                radial-gradient(circle at 80% 70%, #10b981, transparent 40%),
                radial-gradient(circle at 40% 80%, #8b5cf6, transparent 40%),
                radial-gradient(circle at 60% 20%, #ec4899, transparent 40%);
            animation: aiFlow 25s infinite alternate;
            filter: blur(50px);
            opacity: 0.7;
        }

        @keyframes aiFlow {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(15deg) scale(1.4); }
        }

        /* НЕЙРО-ЧАСТИЦЫ */
        .neural-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .particle-ai {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(79, 172, 254, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 20px #4facfe;
            animation: neuralFloat 15s infinite linear;
        }

        @keyframes neuralFloat {
            0% { transform: translateY(100vh) translateX(-100px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) translateX(100vw); opacity: 0; }
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР С ЖИДКИМ СТЕКЛОМ */
        .glass-container {
            position: relative;
            width: 1400px;
            max-width: 95vw;
            height: 850px;
            max-height: 90vh;
            z-index: 20;
            filter: url(#liquid-warp);
        }

        /* СВГ ФИЛЬТР ДЛЯ ЖИДКОСТИ */
        <svg style="position: absolute; width: 0; height: 0;">
            <filter id="liquid-warp" x="-30%" y="-30%" width="160%" height="160%">
                <feTurbulence baseFrequency="0.02 0.03" numOctaves="4" seed="42" result="turb"/>
                <feDisplacementMap in="SourceGraphic" in2="turb" scale="12" xChannelSelector="R" yChannelSelector="G"/>
                <feGaussianBlur stdDeviation="1.5" result="blur"/>
                <feColorMatrix in="blur" mode="saturate" values="1.8"/>
                <feBlend in="SourceGraphic" in2="blur" mode="soft-light"/>
            </filter>
        </svg>

        <!-- ОСНОВНОЕ СТЕКЛЯННОЕ ОКНО -->
        <div class="liquid-glass-window">
            <!-- ЖИДКИЕ СЛОИ -->
            <div class="fluid-layer-1"></div>
            <div class="fluid-layer-2"></div>
            
            <!-- КАПЛИ НА СТЕКЛЕ -->
            <div class="glass-drops">
                <div class="drop-ai" style="--delay: 0s; --size: 250px; --top: 10%; --left: 5%;"></div>
                <div class="drop-ai" style="--delay: 3s; --size: 300px; --top: 60%; --left: 80%;"></div>
                <div class="drop-ai" style="--delay: 6s; --size: 200px; --top: 30%; --left: 40%;"></div>
                <div class="drop-ai" style="--delay: 9s; --size: 350px; --top: 80%; --left: 20%;"></div>
            </div>

            <!-- ИНТЕРФЕЙС CHATGPT СТИЛЬ -->
            <div class="ai-interface">
                <!-- САЙДБАР С ЧАТАМИ -->
                <div class="chats-sidebar">
                    <div class="sidebar-header">
                        <div class="ai-avatar">
                            <span class="ai-icon">🧠</span>
                        </div>
                        <div class="ai-title">DeepSeek AI</div>
                        <div class="status-dot"></div>
                    </div>

                    <div class="search-box-ai">
                        <span>🔍</span>
                        <input type="text" placeholder="Поиск диалогов...">
                    </div>

                    <div class="chats-list-ai">
                        <div class="chat-item-ai active">
                            <div class="chat-icon-ai" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">🤖</div>
                            <div class="chat-info-ai">
                                <div class="chat-name-ai">DeepSeek Assistant</div>
                                <div class="chat-preview-ai">Как я могу помочь?</div>
                            </div>
                            <div class="chat-time-ai">сейчас</div>
                        </div>

                        <div class="chat-item-ai">
                            <div class="chat-icon-ai" style="background: linear-gradient(135deg, #f43f5e, #fb7185);">📝</div>
                            <div class="chat-info-ai">
                                <div class="chat-name-ai">Код на Python</div>
                                <div class="chat-preview-ai">Напиши парсер...</div>
                            </div>
                            <div class="chat-time-ai">2ч назад</div>
                        </div>

                        <div class="chat-item-ai">
                            <div class="chat-icon-ai" style="background: linear-gradient(135deg, #8b5cf6, #a78bfa);">🌐</div>
                            <div class="chat-info-ai">
                                <div class="chat-name-ai">Переводчик</div>
                                <div class="chat-preview-ai">Переведи текст...</div>
                            </div>
                            <div class="chat-time-ai">вчера</div>
                        </div>

                        <div class="chat-item-ai">
                            <div class="chat-icon-ai" style="background: linear-gradient(135deg, #10b981, #34d399);">🎨</div>
                            <div class="chat-info-ai">
                                <div class="chat-name-ai">Дизайн UI</div>
                                <div class="chat-preview-ai">Создай интерфейс...</div>
                            </div>
                            <div class="chat-time-ai">3д назад</div>
                        </div>
                    </div>

                    <div class="sidebar-footer">
                        <div class="user-profile">
                            <div class="user-avatar">👤</div>
                            <div class="user-name">liquid.user</div>
                        </div>
                        <div class="settings-icon">⚙️</div>
                    </div>
                </div>

                <!-- ОСНОВНАЯ ОБЛАСТЬ ЧАТА -->
                <div class="chat-main-area">
                    <div class="chat-header-ai">
                        <div class="header-info">
                            <h2>DeepSeek Assistant</h2>
                            <span class="model-badge">v3 + liquid glass</span>
                        </div>
                        <div class="header-actions">
                            <span class="action-icon">📋</span>
                            <span class="action-icon">🔊</span>
                            <span class="action-icon">⋮</span>
                        </div>
                    </div>

                    <div class="messages-container" id="messagesContainer">
                        <div class="message-row ai-message">
                            <div class="message-avatar">🤖</div>
                            <div class="message-bubble ai-bubble">
                                <div class="message-sender">DeepSeek</div>
                                <div class="message-text">Привет! Я нейросеть DeepSeek с интерфейсом из жидкого стекла. Чем могу помочь?</div>
                                <div class="message-time-ai">10:30</div>
                            </div>
                        </div>

                        <div class="message-row user-message">
                            <div class="message-avatar">👤</div>
                            <div class="message-bubble user-bubble">
                                <div class="message-text">Расскажи о своем интерфейсе</div>
                                <div class="message-time-ai">10:31</div>
                            </div>
                        </div>

                        <div class="message-row ai-message">
                            <div class="message-avatar">🤖</div>
                            <div class="message-bubble ai-bubble">
                                <div class="message-sender">DeepSeek</div>
                                <div class="message-text">
                                    Мой интерфейс выполнен в технике **liquid glass**:
                                    <br>• Прозрачные слои с размытием
                                    <br>• Жидкие искажения по краям
                                    <br>• Плавающие капли на стекле
                                    <br>• Неоновые акценты
                                    <br>• Адаптивная анимация
                                </div>
                                <div class="message-time-ai">10:32</div>
                            </div>
                        </div>
                    </div>

                    <div class="input-area-ai">
                        <div class="input-wrapper">
                            <span class="attach-icon">📎</span>
                            <input type="text" class="message-input-ai" placeholder="Напишите сообщение DeepSeek..." id="messageInput">
                            <span class="send-icon-ai" id="sendButton">📤</span>
                        </div>
                        <div class="ai-suggestions">
                            <span class="suggestion">🔍 Напиши код</span>
                            <span class="suggestion">📝 Переведи текст</span>
                            <span class="suggestion">🎨 Создай дизайн</span>
                            <span class="suggestion">📊 Анализ данных</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ЭФФЕКТ СВЕЧЕНИЯ -->
            <div class="glow-effect-ai"></div>
        </div>

        <style>
            /* ОСНОВНОЕ ОКНО */
            .liquid-glass-window {
                position: relative;
                width: 100%;
                height: 100%;
                background: rgba(10, 15, 25, 0.2);
                backdrop-filter: blur(30px) brightness(1.3);
                -webkit-backdrop-filter: blur(30px) brightness(1.3);
                border-radius: 60px;
                border: 2px solid rgba(255, 255, 255, 0.15);
                box-shadow: 
                    0 40px 80px rgba(0, 0, 0, 0.5),
                    inset 0 0 100px rgba(79, 172, 254, 0.3);
                overflow: hidden;
                transform-style: preserve-3d;
                animation: glassFloat 12s infinite ease-in-out;
            }

            @keyframes glassFloat {
                0%, 100% { transform: rotate(0deg) translateY(0); }
                25% { transform: rotate(0.8deg) translateY(-10px); }
                75% { transform: rotate(-0.8deg) translateY(10px); }
            }

            /* ЖИДКИЕ СЛОИ */
            .fluid-layer-1, .fluid-layer-2 {
                position: absolute;
                top: -20%;
                left: -20%;
                width: 140%;
                height: 140%;
                pointer-events: none;
                z-index: 5;
                mix-blend-mode: overlay;
            }

            .fluid-layer-1 {
                background: radial-gradient(circle at 30% 40%, 
                    rgba(79, 172, 254, 0.2) 0%, 
                    rgba(139, 92, 246, 0.2) 40%,
                    transparent 70%);
                animation: fluidMove1 18s infinite alternate;
                filter: blur(20px);
            }

            .fluid-layer-2 {
                background: radial-gradient(circle at 70% 60%, 
                    rgba(16, 185, 129, 0.15) 0%, 
                    rgba(236, 72, 153, 0.15) 40%,
                    transparent 70%);
                animation: fluidMove2 22s infinite alternate-reverse;
                filter: blur(30px);
            }

            @keyframes fluidMove1 {
                0% { transform: translate(0, 0) scale(1); }
                100% { transform: translate(-5%, -5%) scale(1.1); }
            }

            @keyframes fluidMove2 {
                0% { transform: translate(0, 0) scale(1); }
                100% { transform: translate(5%, 5%) scale(1.15); }
            }

            /* КАПЛИ НА СТЕКЛЕ */
            .glass-drops {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 10;
                overflow: hidden;
            }

            .drop-ai {
                position: absolute;
                width: var(--size);
                height: var(--size);
                top: var(--top);
                left: var(--left);
                background: radial-gradient(circle at 30% 30%, 
                    rgba(255, 255, 255, 0.3) 0%, 
                    rgba(79, 172, 254, 0.2) 50%,
                    transparent 80%);
                border-radius: 50% 40% 60% 30% / 40% 60% 30% 50%;
                filter: blur(15px);
                transform: rotateX(30deg) rotateY(20deg);
                animation: dropFlow 14s infinite alternate;
                animation-delay: var(--delay);
            }

            @keyframes dropFlow {
                0% { transform: rotateX(30deg) rotateY(20deg) scale(1); }
                50% { transform: rotateX(40deg) rotateY(30deg) scale(1.1) translate(10px, -10px); }
                100% { transform: rotateX(20deg) rotateY(10deg) scale(0.9) translate(-10px, 10px); }
            }

            /* ИНТЕРФЕЙС */
            .ai-interface {
                position: relative;
                z-index: 30;
                display: flex;
                width: 100%;
                height: 100%;
                color: white;
            }

            /* САЙДБАР */
            .chats-sidebar {
                width: 300px;
                background: rgba(255, 255, 255, 0.03);
                backdrop-filter: blur(15px);
                border-right: 1px solid rgba(255, 255, 255, 0.1);
                display: flex;
                flex-direction: column;
                padding: 20px 15px;
                gap: 20px;
            }

            .sidebar-header {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 5px;
            }

            .ai-avatar {
                width: 45px;
                height: 45px;
                background: linear-gradient(135deg, #4facfe, #00f2fe);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 24px;
                box-shadow: 0 5px 20px rgba(79, 172, 254, 0.4);
            }

            .ai-title {
                font-size: 18px;
                font-weight: 600;
                flex: 1;
            }

            .status-dot {
                width: 10px;
                height: 10px;
                background: #10b981;
                border-radius: 50%;
                box-shadow: 0 0 20px #10b981;
                animation: pulse 2s infinite;
            }

            .search-box-ai {
                display: flex;
                align-items: center;
                gap: 10px;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 40px;
                padding: 12px 18px;
            }

            .search-box-ai input {
                background: transparent;
                border: none;
                color: white;
                font-size: 14px;
                width: 100%;
                outline: none;
            }

            .chats-list-ai {
                flex: 1;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .chat-item-ai {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px;
                border-radius: 30px;
                background: rgba(255, 255, 255, 0.02);
                border: 1px solid rgba(255, 255, 255, 0.05);
                cursor: pointer;
                transition: all 0.3s;
            }

            .chat-item-ai:hover {
                background: rgba(79, 172, 254, 0.15);
                transform: translateX(5px);
                border-color: rgba(79, 172, 254, 0.3);
            }

            .chat-item-ai.active {
                background: rgba(79, 172, 254, 0.2);
                border-color: rgba(79, 172, 254, 0.5);
            }

            .chat-icon-ai {
                width: 45px;
                height: 45px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 22px;
                flex-shrink: 0;
            }

            .chat-info-ai {
                flex: 1;
            }

            .chat-name-ai {
                font-weight: 600;
                margin-bottom: 4px;
                font-size: 14px;
            }

            .chat-preview-ai {
                font-size: 12px;

            }

            .chat-time-ai {

            }

            .sidebar-footer {

                border-radius: 40px;
            }

            .user-profile {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .user-avatar {
                width: 35px;
                height: 35px;
                background: linear-gradient(135deg, #8b5cf6, #a78bfa);
                border-radius: 50%;
                display: flex;

            }

            .user-name {
                font-size: 14px;

            /* ОСНОВНАЯ ОБЛАСТЬ */
            .chat-main-area {
                flex: 1;
                display: flex;

            }

            .chat-header-ai {
                display: flex;

            }

            .header-info h2 {

            .model-badge {

            }

            .header-actions {

            }

            .action-icon {
                width: 40px;

            }

            .action-icon:hover {
                background: rgba(79, 172, 254, 0.2);

            }

            /* СООБЩЕНИЯ */
            .messages-container {
                flex: 1;
                overflow-y: auto;
                padding: 20px 0;

            }

            .message-row {

            }

            @keyframes messageAppear {

            .message-avatar {
                width: 40px;

    <script>
        // ГЕНЕРАЦИЯ НЕЙРО-ЧАСТИЦ
        function createNeuralParticles() {
            const container = document.querySelector('.neural-particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle-ai';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.width = (Math.random() * 6 + 2) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        createNeuralParticles();

        // ИМИТАЦИЯ ОТПРАВКИ СООБЩЕНИЙ
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const messagesContainer = document.getElementById('messagesContainer');

        function addUserMessage(text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-row user-message';
            messageDiv.innerHTML = `
                <div class="message-avatar">👤</div>
                <div class="message-bubble user-bubble">
                    <div class="message-text">${text}</div>
                    <div class="message-time-ai">${new Date().getHours()}:${String(new Date().getMinutes()).padStart(2, '0')}</div>
                </div>
            `;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addAiMessage(text) {
            setTimeout(() => {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message-row ai-message';
                messageDiv.innerHTML = `
                    <div class="message-avatar">🤖</div>
                    <div class="message-bubble ai-bubble">
                        <div class="message-sender">DeepSeek</div>
                        <div class="message-text">${text}</div>
                        <div class="message-time-ai">${new Date().getHours()}:${String(new Date().getMinutes()).padStart(2, '0')}</div>
                    </div>
                `;
                messagesContainer.appendChild(messageDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 1000);
        }

        sendButton.addEventListener('click', () => {
            const text = messageInput.value.trim();
            if (text) {
                addUserMessage(text);
                messageInput.value = '';
                addAiMessage("Я DeepSeek с жидким стеклянным интерфейсом! Получил ваше сообщение: \"" + text + "\". Чем еще могу помочь? 🌊");
            }
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendButton.click();
            }
        });

        // СУГГЕСТИИ
        document.querySelectorAll('.suggestion').forEach(suggestion => {
            suggestion.addEventListener('click', () => {
                messageInput.value = suggestion.textContent;
                sendButton.click();
            });
        });

        // ПАРАЛЛАКС ЭФФЕКТ
        document.addEventListener('mousemove', (e) => {
            const glass = document.querySelector('.liquid-glass-window');
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            glass.style.transform = `rotateY(${x}deg) rotateX(${-y}deg) translateZ(10px)`;
        });
    </script>
</body>
</html>
