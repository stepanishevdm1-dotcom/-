<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Stabilizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: #000;
            color: white;
            touch-action: none;
        }
        
        #videoCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            background: #000;
        }
        
        #permission-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        
        .permission-btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            margin: 10px;
            cursor: pointer;
            font-weight: 600;
            width: 250px;
        }
        
        .permission-btn.secondary {
            background: #333;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            pointer-events: none;
        }
        
        #debugInfo {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #8ae;
            z-index: 20;
            pointer-events: none;
        }
        
        .controls-panel {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            z-index: 30;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.15);
            max-width: 400px;
            margin: 0 auto;
            pointer-events: all;
        }
        
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        input[type=range] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #4a6a8a, #aaddff);
            border-radius: 10px;
            margin: 0 10px;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            border: 2px solid #4a90e2;
            cursor: pointer;
        }
        
        .value-display {
            min-width: 45px;
            text-align: center;
            background: #1e2a36;
            padding: 5px 8px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #aaddff;
        }
    </style>
</head>
<body>
    <canvas id="videoCanvas"></canvas>
    
    <div id="permission-overlay">
        <h2 style="color: white; margin-bottom: 30px;">🎥 Стабилизатор изображения</h2>
        <p style="color: #ccc; margin-bottom: 30px;">Нужен доступ к камере и гироскопу</p>
        <button class="permission-btn" id="requestCameraBtn">📷 Включить камеру</button>
        <button class="permission-btn secondary" id="requestGyroBtn">🧭 Включить гироскоп</button>
        <p style="color: #888; margin-top: 30px; font-size: 0.8rem;">
            На iPhone нужно разрешить доступ
        </p>
    </div>

    <div id="info">
        🎥 Стабилизатор • Широкоугольная камера
    </div>

    <div id="debugInfo">
        ⏳ Ожидание...
    </div>

    <div class="controls-panel">
        <div class="control-row">
            <span>⚡ Мощность стабилизации</span>
            <div style="display: flex; align-items: center; flex: 1;">
                <input type="range" id="stabStrength" min="0.5" max="3" step="0.1" value="2.0">
                <span id="strengthValue" class="value-display">2.0x</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Элементы
            const canvas = document.getElementById('videoCanvas');
            const ctx = canvas.getContext('2d');
            const debugDiv = document.getElementById('debugInfo');
            const overlay = document.getElementById('permission-overlay');
            
            // Видео
            const video = document.createElement('video');
            video.autoplay = true;
            video.playsInline = true;
            video.muted = true;
            
            // Состояние
            let videoStream = null;
            let videoTrack = null;
            let cameraActive = false;
            let gyroActive = false;
            let isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            
            // Данные гироскопа
            let alpha = 0, beta = 0, gamma = 0;
            let prevAlpha = 0, prevBeta = 0, prevGamma = 0;
            
            // Настройки
            let stabilStrength = 2.0;
            
            // Размеры
            let videoWidth = 1920, videoHeight = 1080;
            
            // Сглаживание (фильтр низких частот)
            const smoothing = 0.85; // 0 = нет сглаживания, 1 = очень плавно
            
            // Функция обновления размера canvas
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            // === ЗАПРОС КАМЕРЫ ===
            async function requestCamera() {
                try {
                    const constraints = {
                        video: {
                            facingMode: { exact: 'environment' },
                            width: { ideal: 1920 },
                            height: { ideal: 1080 }
                        },
                        audio: false
                    };
                    
                    videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                    videoTrack = videoStream.getVideoTracks()[0];
                    
                    console.log('Камера:', videoTrack.label);
                    
                    // Пытаемся установить широкий угол
                    trySetWideAngle();
                    
                    video.srcObject = videoStream;
                    
                    await new Promise((resolve) => {
                        video.onplaying = () => {
                            videoWidth = video.videoWidth;
                            videoHeight = video.videoHeight;
                            resolve();
                        };
                        video.play();
                    });
                    
                    cameraActive = true;
                    checkAllPermissions();
                    
                } catch (err) {
                    console.error('Ошибка камеры:', err);
                    alert('Ошибка доступа к камере');
                }
            }
            
            // Широкий угол
            async function trySetWideAngle() {
                if (!videoTrack) return;
                
                try {
                    const capabilities = videoTrack.getCapabilities?.();
                    if (capabilities?.zoom) {
                        await videoTrack.applyConstraints({
                            advanced: [{ zoom: capabilities.zoom.min || 0.5 }]
                        });
                        console.log('Зум установлен на минимум');
                    }
                } catch (e) {
                    console.warn('Не удалось настроить зум');
                }
            }
            
            // === ЗАПРОС ГИРОСКОПА ===
            function requestGyro() {
                if (isIOS && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                                gyroActive = true;
                                checkAllPermissions();
                            }
                        })
                        .catch(console.error);
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                    gyroActive = true;
                    checkAllPermissions();
                }
            }
            
            // Обработка гироскопа с сглаживанием
            function handleOrientation(event) {
                // Получаем новые значения
                const newAlpha = event.alpha || 0;
                const newBeta = event.beta || 0;
                const newGamma = event.gamma || 0;
                
                // Применяем сглаживание (низкочастотный фильтр)
                alpha = alpha * smoothing + newAlpha * (1 - smoothing);
                beta = beta * smoothing + newBeta * (1 - smoothing);
                gamma = gamma * smoothing + newGamma * (1 - smoothing);
                
                updateDebug();
            }
            
            // Проверка разрешений
            function checkAllPermissions() {
                if (cameraActive && gyroActive) {
                    overlay.style.display = 'none';
                    renderFrame();
                }
            }
            
            // === СТАБИЛИЗАЦИЯ ===
            function computeTransform() {
                if (!cameraActive) {
                    return { dx: 0, dy: 0, rotate: 0, scale: 2.0 };
                }
                
                // Инвертируем направление для компенсации
                // Чем больше stabilStrength, тем сильнее компенсация
                const correctionAlpha = -alpha * stabilStrength * 0.5;
                const correctionBeta = -beta * stabilStrength * 0.7;
                const correctionGamma = -gamma * stabilStrength * 0.8;
                
                // Конвертируем градусы в пиксели
                const pxPerDegree = 15;
                
                let dx = correctionAlpha * pxPerDegree;
                let dy = correctionBeta * pxPerDegree;
                let rotate = correctionGamma;
                
                // Масштаб для заполнения экрана (чтобы не было черных краев)
                // Чем сильнее стабилизация, тем больше зум
                let scale = 1.8 + (stabilStrength * 0.3);
                
                return { dx, dy, rotate, scale };
            }
            
            // Отрисовка
            function renderFrame() {
                if (!cameraActive || video.readyState < 2) {
                    requestAnimationFrame(renderFrame);
                    return;
                }
                
                try {
                    const { dx, dy, rotate, scale } = computeTransform();
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.save();
                    
                    // Центрируем
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    
                    // Поворот
                    ctx.rotate(rotate * Math.PI / 180);
                    
                    // Масштаб
                    ctx.scale(scale, scale);
                    
                    // Смещение
                    ctx.translate(dx, dy);
                    
                    // Рисуем видео
                    const videoAspect = videoWidth / videoHeight;
                    const canvasAspect = canvas.width / canvas.height;
                    
                    let drawWidth, drawHeight;
                    if (videoAspect > canvasAspect) {
                        drawHeight = canvas.height;
                        drawWidth = drawHeight * videoAspect;
                    } else {
                        drawWidth = canvas.width;
                        drawHeight = drawWidth / videoAspect;
                    }
                    
                    ctx.drawImage(video, -drawWidth/2, -drawHeight/2, drawWidth, drawHeight);
                    ctx.restore();
                    
                } catch (e) {
                    console.error('Ошибка рендера:', e);
                }
                
                requestAnimationFrame(renderFrame);
            }
            
            // Обновление отладочной информации
            function updateDebug() {
                if (!gyroActive) return;
                debugDiv.innerHTML = `α:${alpha.toFixed(0)}° β:${beta.toFixed(0)}° γ:${gamma.toFixed(0)}° | стаб:${stabilStrength.toFixed(1)}x`;
            }
            
            // === UI ===
            document.getElementById('requestCameraBtn').addEventListener('click', requestCamera);
            document.getElementById('requestGyroBtn').addEventListener('click', requestGyro);
            
            const strengthSlider = document.getElementById('stabStrength');
            strengthSlider.addEventListener('input', (e) => {
                stabilStrength = parseFloat(e.target.value);
                document.getElementById('strengthValue').textContent = stabilStrength.toFixed(1) + 'x';
            });
            
            // Для Android запускаем автоматически
            if (!isIOS) {
                requestCamera();
                requestGyro();
            }
            
        })();
    </script>
</body>
</html>
