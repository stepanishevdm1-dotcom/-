<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Stabilizer & Horizon Lock</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: white;
            touch-action: none;
        }
        
        #videoCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            background: #000;
        }
        
        #permission-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        
        .permission-btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            margin: 10px;
            cursor: pointer;
            font-weight: 600;
            width: 250px;
        }
        
        .permission-btn.secondary {
            background: #333;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            pointer-events: none;
        }
        
        #debugInfo {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #8ae;
            z-index: 20;
            pointer-events: none;
        }
        
        .controls-panel {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            z-index: 30;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.15);
            max-width: 400px;
            margin: 0 auto;
            pointer-events: all;
        }
        
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .lock-toggle {
            background: #1e3a4a;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: 1px solid #3a6a8a;
            min-width: 100px;
            justify-content: center;
        }
        
        .lock-toggle.active {
            background: #2a6a8a;
            border-color: #8ac4ff;
            box-shadow: 0 0 15px #3a9eff;
        }
        
        input[type=range] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #4a6a8a, #aaddff);
            border-radius: 10px;
            margin: 0 10px;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            border: 2px solid #4a90e2;
            cursor: pointer;
        }
        
        .value-display {
            min-width: 45px;
            text-align: center;
            background: #1e2a36;
            padding: 5px 8px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #aaddff;
        }
    </style>
</head>
<body>
    <canvas id="videoCanvas"></canvas>
    
    <div id="permission-overlay">
        <h2 style="color: white; margin-bottom: 30px;">🎥 Стабилизатор изображения</h2>
        <p style="color: #ccc; margin-bottom: 30px;">Для работы нужен доступ к камере и гироскопу</p>
        <button class="permission-btn" id="requestCameraBtn">📷 Включить камеру</button>
        <button class="permission-btn secondary" id="requestGyroBtn">🧭 Включить гироскоп</button>
        <p style="color: #888; margin-top: 30px; font-size: 0.8rem;">
            На iPhone нужно нажать "Разрешить" на обоих запросах
        </p>
    </div>

    <div id="info">
        🎥 Стабилизатор • Широкоугольная камера
    </div>

    <div id="debugInfo">
        ⏳ Ожидание...
    </div>

    <div class="controls-panel">
        <div class="control-row">
            <span>⚡ Мощность</span>
            <div style="display: flex; align-items: center; flex: 1;">
                <input type="range" id="stabStrength" min="0" max="2" step="0.1" value="1.2">
                <span id="strengthValue" class="value-display">1.2x</span>
            </div>
        </div>

        <div class="control-row">
            <span>🧭 Горизонт</span>
            <button id="horizonLockBtn" class="lock-toggle">
                <span class="lock-icon">🔓</span>
                <span id="lockText">Выкл</span>
            </button>
        </div>
    </div>

    <script>
        (function() {
            // Элементы
            const canvas = document.getElementById('videoCanvas');
            const ctx = canvas.getContext('2d');
            const debugDiv = document.getElementById('debugInfo');
            const overlay = document.getElementById('permission-overlay');
            
            // Видео
            const video = document.createElement('video');
            video.autoplay = true;
            video.playsInline = true;
            video.muted = true;
            
            // Состояние
            let videoStream = null;
            let videoTrack = null;
            let cameraActive = false;
            let gyroActive = false;
            let isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            
            // Данные гироскопа
            let alpha = 0, beta = 0, gamma = 0;
            let homeAlpha = 0, homeBeta = 0, homeGamma = 0;
            let homeSet = false;
            
            // Настройки
            let stabilStrength = 1.2; // мощность по умолчанию
            let horizonLock = false;
            
            // Размеры видео
            let videoWidth = 1920, videoHeight = 1080;
            
            // Функция обновления размера canvas
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                console.log('Canvas resized:', canvas.width, canvas.height);
            }
            
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            // === ЗАПРОС КАМЕРЫ ===
            async function requestCamera() {
                try {
                    console.log('Запрос камеры...');
                    
                    const constraints = {
                        video: {
                            facingMode: { exact: 'environment' }, // задняя камера
                            width: { ideal: 1920 },
                            height: { ideal: 1080 }
                        },
                        audio: false
                    };
                    
                    videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                    videoTrack = videoStream.getVideoTracks()[0];
                    
                    console.log('✅ Камера получена:', videoTrack.label);
                    
                    // Пытаемся установить широкий угол
                    await trySetWideAngle();
                    
                    video.srcObject = videoStream;
                    
                    // Ждем начала воспроизведения
                    await new Promise((resolve) => {
                        video.onplaying = () => {
                            videoWidth = video.videoWidth;
                            videoHeight = video.videoHeight;
                            console.log('Видео размер:', videoWidth, videoHeight);
                            resolve();
                        };
                        video.play();
                    });
                    
                    cameraActive = true;
                    checkAllPermissions();
                    
                } catch (err) {
                    console.error('❌ Ошибка камеры:', err);
                    alert('Ошибка доступа к камере. Убедитесь, что разрешение дано.');
                }
            }
            
            // Попытка установить широкий угол
            async function trySetWideAngle() {
                if (!videoTrack) return;
                
                try {
                    const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
                    console.log('Возможности камеры:', capabilities);
                    
                    if (capabilities.zoom) {
                        // Устанавливаем минимальный зум (широкий угол)
                        await videoTrack.applyConstraints({
                            advanced: [{
                                zoom: capabilities.zoom.min || 0.5
                            }]
                        });
                        console.log('✅ Зум установлен на минимум:', capabilities.zoom.min);
                    }
                } catch (e) {
                    console.warn('Не удалось настроить зум:', e);
                }
            }
            
            // === ЗАПРОС ГИРОСКОПА ===
            function requestGyro() {
                console.log('Запрос гироскопа...');
                
                if (isIOS && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                                gyroActive = true;
                                console.log('✅ Гироскоп разрешен');
                                checkAllPermissions();
                            }
                        })
                        .catch(console.error);
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                    gyroActive = true;
                    console.log('✅ Гироскоп активирован');
                    checkAllPermissions();
                }
            }
            
            // Обработка гироскопа
            function handleOrientation(event) {
                alpha = event.alpha || 0;  // вращение вокруг Z
                beta = event.beta || 0;     // наклон вперед-назад
                gamma = event.gamma || 0;    // наклон влево-вправо
                
                if (!homeSet) {
                    homeAlpha = alpha;
                    homeBeta = beta;
                    homeGamma = gamma;
                    homeSet = true;
                    console.log('Home position set');
                }
                
                updateDebug();
            }
            
            // Проверка всех разрешений
            function checkAllPermissions() {
                if (cameraActive && gyroActive) {
                    console.log('✅ Все разрешения получены, запуск...');
                    overlay.style.display = 'none';
                    renderFrame();
                }
            }
            
            // === ОСНОВНАЯ ЛОГИКА СТАБИЛИЗАЦИИ ===
            function computeTransform() {
                if (!homeSet || !cameraActive) {
                    return { dx: 0, dy: 0, rotate: 0, scale: 2.0 };
                }
                
                // Вычисляем дельты относительно home
                let deltaAlpha = alpha - homeAlpha;
                let deltaBeta = beta - homeBeta;
                let deltaGamma = gamma - homeGamma;
                
                // Нормализуем углы
                deltaAlpha = ((deltaAlpha + 180) % 360) - 180;
                deltaBeta = Math.max(-90, Math.min(90, deltaBeta));
                deltaGamma = Math.max(-90, Math.min(90, deltaGamma));
                
                if (!horizonLock) {
                    // Без блокировки постепенно обновляем home (плавающий ноль)
                    homeAlpha = alpha;
                    homeBeta = beta;
                    homeGamma = gamma;
                }
                
                // ИНВЕРТИРУЕМ направление (теперь двигаем видео в ту же сторону, что и телефон)
                // и применяем мощность стабилизации
                const correctionAlpha = -deltaAlpha * stabilStrength;  // минус для правильного направления
                const correctionBeta = -deltaBeta * stabilStrength;
                const correctionGamma = -deltaGamma * stabilStrength;
                
                // Конвертируем градусы в пиксели (увеличил чувствительность)
                const pxPerDegree = 20;
                
                let dx = correctionAlpha * pxPerDegree;
                let dy = correctionBeta * pxPerDegree;
                let rotate = correctionGamma;
                
                // УВЕЛИЧИВАЕМ МАСШТАБ чтобы не было серых краев
                // Чем сильнее стабилизация, тем больше зум
                let scale = 1.8 + (stabilStrength * 0.5);
                
                return { dx, dy, rotate, scale };
            }
            
            // Отрисовка кадра
            function renderFrame() {
                if (!cameraActive || video.readyState < 2) {
                    requestAnimationFrame(renderFrame);
                    return;
                }
                
                try {
                    const { dx, dy, rotate, scale } = computeTransform();
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.save();
                    
                    // Перемещаем центр в центр canvas
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    
                    // Применяем поворот (компенсация крена)
                    ctx.rotate(rotate * Math.PI / 180);
                    
                    // Применяем масштаб (чтобы скрыть края)
                    ctx.scale(scale, scale);
                    
                    // Применяем смещение (компенсация рысканья и тангажа)
                    ctx.translate(dx, dy);
                    
                    // Рисуем видео
                    const videoAspect = videoWidth / videoHeight;
                    const canvasAspect = canvas.width / canvas.height;
                    
                    let drawWidth, drawHeight;
                    if (videoAspect > canvasAspect) {
                        drawHeight = canvas.height;
                        drawWidth = drawHeight * videoAspect;
                    } else {
                        drawWidth = canvas.width;
                        drawHeight = drawWidth / videoAspect;
                    }
                    
                    ctx.drawImage(video, -drawWidth/2, -drawHeight/2, drawWidth, drawHeight);
                    ctx.restore();
                    
                } catch (e) {
                    console.error('Ошибка рендера:', e);
                }
                
                requestAnimationFrame(renderFrame);
            }
            
            // Обновление отладочной информации
            function updateDebug() {
                if (!gyroActive) return;
                
                let lockSymbol = horizonLock ? '🔒' : '🔓';
                debugDiv.innerHTML = `α:${alpha.toFixed(0)}° β:${beta.toFixed(0)}° γ:${gamma.toFixed(0)}° | ${lockSymbol} ${stabilStrength.toFixed(1)}x`;
            }
            
            // === UI ОБРАБОТЧИКИ ===
            document.getElementById('requestCameraBtn').addEventListener('click', requestCamera);
            document.getElementById('requestGyroBtn').addEventListener('click', requestGyro);
            
            const strengthSlider = document.getElementById('stabStrength');
            strengthSlider.addEventListener('input', (e) => {
                stabilStrength = parseFloat(e.target.value);
                document.getElementById('strengthValue').textContent = stabilStrength.toFixed(1) + 'x';
            });
            
            const lockBtn = document.getElementById('horizonLockBtn');
            lockBtn.addEventListener('click', () => {
                horizonLock = !horizonLock;
                if (horizonLock) {
                    // При включении блокировки запоминаем текущее положение как горизонт
                    homeAlpha = alpha;
                    homeBeta = beta;
                    homeGamma = gamma;
                    lockBtn.classList.add('active');
                    lockBtn.querySelector('.lock-icon').textContent = '🔒';
                    document.getElementById('lockText').textContent = 'Вкл';
                } else {
                    lockBtn.classList.remove('active');
                    lockBtn.querySelector('.lock-icon').textContent = '🔓';
                    document.getElementById('lockText').textContent = 'Выкл';
                }
            });
            
            // Для Android запускаем автоматически
            if (!isIOS) {
                requestCamera();
                requestGyro();
            }
            
            console.log('Скрипт загружен');
        })();
    </script>
</body>
</html>
