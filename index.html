<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram с загнутым жидким стеклом</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            perspective-origin: center;
            overflow: hidden;
        }

        /* Динамический фон с частицами */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 20% 30%, #1a2a4a, #0a0f1e 70%);
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(100, 180, 255, 0.3);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(70, 130, 255, 0.5);
            animation: float 15s infinite linear;
        }

        @keyframes float {
            from {
                transform: translateY(100vh) translateX(-100px);
            }
            to {
                transform: translateY(-100px) translateX(100vw);
            }
        }

        /* Основной контейнер с эффектом изгиба */
        .phone-wrapper {
            position: relative;
            z-index: 10;
            width: 380px;
            height: 750px;
            transform-style: preserve-3d;
            animation: floatPhone 6s infinite ease-in-out;
            filter: drop-shadow(0 30px 50px rgba(0, 0, 0, 0.6));
        }

        @keyframes floatPhone {
            0%, 100% {
                transform: rotateY(0deg) translateY(0);
            }
            25% {
                transform: rotateY(2deg) translateY(-10px);
            }
            75% {
                transform: rotateY(-2deg) translateY(10px);
            }
        }

        /* Корпус с загнутыми краями */
        .phone-body {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50px;
            background: linear-gradient(145deg, rgba(30, 40, 60, 0.9), rgba(10, 15, 30, 0.95));
            padding: 15px;
            box-shadow: 
                0 30px 40px -20px rgba(0, 0, 0, 0.8),
                inset 0 -5px 20px rgba(255, 255, 255, 0.1),
                inset 0 5px 20px rgba(255, 255, 255, 0.05);
            transform-style: preserve-3d;
        }

        /* Эффект загнутых краев (как у гибкого OLED) */
        .phone-body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50px;
            padding: 3px;
            background: linear-gradient(145deg, 
                rgba(255, 255, 255, 0.5) 0%, 
                rgba(255, 255, 255, 0.2) 20%,
                rgba(255, 255, 255, 0) 40%,
                rgba(255, 255, 255, 0) 60%,
                rgba(255, 255, 255, 0.2) 80%,
                rgba(255, 255, 255, 0.5) 100%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transform: translateZ(2px);
        }

        /* Динамические блики на изгибах */
        .edge-glow {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50px;
            box-shadow: 
                inset 0 0 30px rgba(70, 130, 255, 0.3),
                inset 10px 0 30px rgba(70, 130, 255, 0.2),
                inset -10px 0 30px rgba(70, 130, 255, 0.2);
            pointer-events: none;
            transform: translateZ(1px);
            animation: edgePulse 4s infinite;
        }

        @keyframes edgePulse {
            0%, 100% {
                box-shadow: 
                    inset 0 0 30px rgba(70, 130, 255, 0.3),
                    inset 10px 0 30px rgba(70, 130, 255, 0.2),
                    inset -10px 0 30px rgba(70, 130, 255, 0.2);
            }
            50% {
                box-shadow: 
                    inset 0 0 40px rgba(100, 150, 255, 0.5),
                    inset 15px 0 40px rgba(100, 150, 255, 0.3),
                    inset -15px 0 40px rgba(100, 150, 255, 0.3);
            }
        }

        /* Динамические капли на поверхности */
        .liquid-drops {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50px;
            overflow: hidden;
            pointer-events: none;
            transform: translateZ(3px);
        }

        .drop {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255, 255, 255, 0.4) 0%, 
                rgba(255, 255, 255, 0.1) 70%);
            border-radius: 50%;
            filter: blur(5px);
            animation: dropFlow 8s infinite;
        }

        @keyframes dropFlow {
            0% {
                transform: translateX(-100%) translateY(-100%) scale(1);
                opacity: 0;
            }
            20% {
                opacity: 0.5;
            }
            80% {
                opacity: 0.3;
            }
            100% {
                transform: translateX(200%) translateY(200%) scale(2);
                opacity: 0;
            }
        }

        /* Стеклянный экран */
        .screen {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgba(20, 25, 40, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 
                inset 0 0 50px rgba(0, 0, 0, 0.5),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            transform-style: preserve-3d;
            transform: translateZ(5px);
        }

        /* Эффект жидкой ряби */
        .screen::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255, 255, 255, 0.1) 0%, 
                rgba(255, 255, 255, 0) 50%);
            animation: ripple 10s infinite;
            pointer-events: none;
        }

        @keyframes ripple {
            0% {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(5deg) scale(1.1);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        /* Контент Telegram */
        .content {
            position: relative;
            z-index: 20;
            height: 100%;
            display: flex;
            flex-direction: column;
            color: white;
            padding: 20px 15px;
            gap: 20px;
        }

        /* Хедер */
        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 5px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0, 200, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .avatar::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            animation: avatarGlow 3s infinite;
        }

        @keyframes avatarGlow {
            0%, 100% { transform: translate(-30%, -30%); }
            50% { transform: translate(30%, 30%); }
        }

        /* Поиск */
        .search-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 12px 20px;
            color: white;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .chat-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.05), 
                transparent);
            transition: left 0.5s;
        }

        .chat-item:hover::before {
            left: 100%;
        }

        .chat-item:hover {
            transform: translateX(5px) translateY(-2px);
            background: rgba(79, 172, 254, 0.1);
            border-color: rgba(79, 172, 254, 0.3);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            position: relative;
        }

        .online-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #4caf50;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .chat-message {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            justify-content: space-between;
        }

        .time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* Нижнее меню */
        .bottom-menu {
            display: flex;
            justify-content: space-around;
            padding: 15px 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: auto;
        }

        .menu-item {
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .menu-item:hover {
            color: #4facfe;
            background: rgba(79, 172, 254, 0.1);
            transform: translateY(-3px);
        }

        .menu-item.active {
            color: #4facfe;
            background: rgba(79, 172, 254, 0.15);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3);
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        /* Генерация случайных частиц */
        .particle:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; }
        .particle:nth-child(2) { left: 30%; animation-duration: 15s; animation-delay: 2s; }
        .particle:nth-child(3) { left: 50%; animation-duration: 10s; animation-delay: 1s; }
        .particle:nth-child(4) { left: 70%; animation-duration: 18s; animation-delay: 3s; }
        .particle:nth-child(5) { left: 90%; animation-duration: 14s; animation-delay: 4s; }

        /* Капли */
        .drop:nth-child(1) {
            width: 150px;
            height: 150px;
            top: 10%;
            left: 20%;
            animation-duration: 12s;
        }
        .drop:nth-child(2) {
            width: 200px;
            height: 200px;
            bottom: 20%;
            right: 10%;
            animation-duration: 15s;
            animation-delay: 3s;
        }
        .drop:nth-child(3) {
            width: 100px;
            height: 100px;
            top: 50%;
            left: 50%;
            animation-duration: 8s;
            animation-delay: 1s;
        }
    </style>
</head>
<body>
    <!-- Частицы фона -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Телефон с загнутым жидким стеклом -->
    <div class="phone-wrapper">
        <div class="phone-body">
            <div class="edge-glow"></div>
            <div class="liquid-drops">
                <div class="drop"></div>
                <div class="drop"></div>
                <div class="drop"></div>
            </div>
            <div class="screen">
                <div class="content">
                    <!-- Верхняя панель -->
                    <div class="header">
                        <div class="avatar">A</div>
                        <input type="text" class="search-box" placeholder="Поиск в Telegram...">
                    </div>

                    <!-- Список чатов -->
                    <div class="chats-list">
                        <div class="chat-item">
                            <div class="chat-avatar">
                                M
                                <span class="online-badge"></span>
                            </div>
                            <div class="chat-info">
                                <div class="chat-name">Михаил</div>
                                <div class="chat-message">
                                    <span>Привет! Как дела?</span>
                                    <span class="time">12:30</span>
                                </div>
                            </div>
                        </div>

                        <div class="chat-item">
                            <div class="chat-avatar">
                                А
                            </div>
                            <div class="chat-info">
                                <div class="chat-name">Анна Смирнова</div>
                                <div class="chat-message">
                                    <span>Фото 📸</span>
                                    <span class="time">11:15</span>
                                </div>
                            </div>
                        </div>

                        <div class="chat-item">
                            <div class="chat-avatar">
                                Р
                                <span class="online-badge"></span>
                            </div>
                            <div class="chat-info">
                                <div class="chat-name">Рабочий чат</div>
                                <div class="chat-message">
                                    <span>Дмитрий: Встреча в 15:00</span>
                                    <span class="time">10:45</span>
                                </div>
                            </div>
                        </div>

                        <div class="chat-item">
                            <div class="chat-avatar">
                                С
                            </div>
                            <div class="chat-info">
                                <div class="chat-name">Семейный чат</div>
                                <div class="chat-message">
                                    <span>Мама: Ужин готов!</span>
                                    <span class="time">09:20</span>
                                </div>
                            </div>
                        </div>

                        <div class="chat-item">
                            <div class="chat-avatar">
                                Д
                                <span class="online-badge"></span>
                            </div>
                            <div class="chat-info">
                                <div class="chat-name">Дмитрий</div>
                                <div class="chat-message">
                                    <span>Го в CS?</span>
                                    <span class="time">Вчера</span>
                                </div>
                            </div>
                        </div>

                        <div class="chat-item">
                            <div class="chat-avatar">
                                К
                            </div>
                            <div class="chat-info">
                                <div class="chat-name">Катя</div>
                                <div class="chat-message">
                                    <span>Спасибо за подарок! 🎁</span>
                                    <span class="time">Вчера</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Нижнее меню -->
                    <div class="bottom-menu">
                        <div class="menu-item active">💬</div>
                        <div class="menu-item">👥</div>
                        <div class="menu-item">📞</div>
                        <div class="menu-item">⚙️</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Создаем дополнительные частицы динамически
        function createParticles() {
            const particlesContainer = document.querySelector('.particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.width = Math.random() * 6 + 2 + 'px';
                particle.style.height = particle.style.width;
                particlesContainer.appendChild(particle);
            }
        }

        // Создаем капли
        function createDrops() {
            const dropsContainer = document.querySelector('.liquid-drops');
            for (let i = 0; i < 5; i++) {
                const drop = document.createElement('div');
                drop.className = 'drop';
                drop.style.width = Math.random() * 150 + 100 + 'px';
                drop.style.height = drop.style.width;
                drop.style.top = Math.random() * 100 + '%';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.animationDuration = (Math.random() * 10 + 8) + 's';
                drop.style.animationDelay = Math.random() * 5 + 's';
                dropsContainer.appendChild(drop);
            }
        }

        createParticles();
        createDrops();

        // Добавляем параллакс эффект при движении мыши
        document.addEventListener('mousemove', (e) => {
            const wrapper = document.querySelector('.phone-wrapper');
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            wrapper.style.transform = `rotateY(${x}deg) rotateX(${-y}deg) translateY(${y/2}px)`;
        });

        // Возвращаем в исходное положение при уходе мыши
        document.addEventListener('mouseleave', () => {
            const wrapper = document.querySelector('.phone-wrapper');
            wrapper.style.transform = 'rotateY(0deg) rotateX(0deg) translateY(0)';
        });
    </script>
</body>
</html>
