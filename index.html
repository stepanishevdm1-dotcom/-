<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Liquid Glass - Рабочая версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ЖИДКИЙ ФОН */
        .liquid-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, #4facfe, transparent 40%),
                radial-gradient(circle at 80% 70%, #a855f7, transparent 40%),
                radial-gradient(circle at 40% 80%, #ec4899, transparent 40%);
            animation: liquidBg 20s infinite alternate;
            filter: blur(60px);
            opacity: 0.6;
        }

        @keyframes liquidBg {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(15deg) scale(1.3); }
        }

        <!-- ФИЛЬТР ДЛЯ ЖИДКОГО СТЕКЛА -->
        <svg style="position: absolute; width: 0; height: 0;">
            <filter id="liquid-filter">
                <feTurbulence baseFrequency="0.02 0.03" numOctaves="3" seed="2"/>
                <feDisplacementMap in="SourceGraphic" scale="8" xChannelSelector="R" yChannelSelector="G"/>
                <feGaussianBlur stdDeviation="1.5"/>
                <feColorMatrix type="saturate" values="1.5"/>
            </filter>
        </svg>

        <!-- ОСНОВНОЕ ОКНО -->
        <div class="glass-container">
            <div class="liquid-glass">
                <!-- ЖИДКИЙ СЛОЙ -->
                <div class="fluid-overlay"></div>
                
                <!-- ИНТЕРФЕЙС -->
                <div class="interface">
                    <!-- ЛЕВАЯ ПАНЕЛЬ -->
                    <div class="sidebar">
                        <div class="logo-section">
                            <div class="logo">
                                <span class="logo-icon">🧠</span>
                                <span class="logo-text">DeepSeek</span>
                            </div>
                            <div class="status">
                                <span class="dot"></span>
                                <span>API Ready</span>
                            </div>
                        </div>

                        <div class="new-chat-btn" id="newChatBtn">
                            <span>+</span>
                            <span>Новый чат</span>
                        </div>

                        <div class="chats-history" id="chatsHistory">
                            <!-- Чаты будут добавляться сюда -->
                        </div>

                        <div class="user-section">
                            <div class="user-avatar">👤</div>
                            <div class="user-info">
                                <div class="user-name">Liquid User</div>
                                <div class="user-plan">DeepSeek + Glass</div>
                            </div>
                            <div class="settings">⚙️</div>
                        </div>
                    </div>

                    <!-- ПРАВАЯ ПАНЕЛЬ - ЧАТ -->
                    <div class="chat-area">
                        <div class="chat-header" id="chatHeader">
                            <div class="chat-title">DeepSeek Assistant</div>
                            <div class="chat-model">Liquid Glass Edition</div>
                        </div>

                        <div class="messages" id="messages">
                            <!-- Сообщения будут здесь -->
                        </div>

                        <div class="input-container">
                            <div class="suggestions" id="suggestions">
                                <span class="suggestion">Напиши код</span>
                                <span class="suggestion">Переведи текст</span>
                                <span class="suggestion">Объясни концепцию</span>
                                <span class="suggestion">Создай дизайн</span>
                            </div>
                            <div class="input-wrapper">
                                <textarea 
                                    class="message-input" 
                                    id="messageInput" 
                                    placeholder="Спроси у DeepSeek..."
                                    rows="1"
                                ></textarea>
                                <button class="send-btn" id="sendBtn">
                                    <span>📤</span>
                                </button>
                            </div>
                            <div class="api-status" id="apiStatus">
                                ⚡ DeepSeek API активен
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <style>
            .glass-container {
                position: relative;
                width: 1400px;
                max-width: 95vw;
                height: 900px;
                max-height: 95vh;
                z-index: 10;
                filter: url(#liquid-filter);
            }

            .liquid-glass {
                width: 100%;
                height: 100%;
                background: rgba(10, 15, 25, 0.15);
                backdrop-filter: blur(35px) brightness(1.4);
                -webkit-backdrop-filter: blur(35px) brightness(1.4);
                border-radius: 60px;
                border: 2px solid rgba(255, 255, 255, 0.15);
                box-shadow: 
                    0 30px 60px rgba(0, 0, 0, 0.6),
                    inset 0 0 80px rgba(79, 172, 254, 0.3);
                overflow: hidden;
                position: relative;
            }

            .fluid-overlay {
                position: absolute;
                top: -20%;
                left: -20%;
                width: 140%;
                height: 140%;
                background: radial-gradient(circle at 40% 50%, 
                    rgba(79, 172, 254, 0.15) 0%, 
                    rgba(168, 85, 247, 0.1) 50%,
                    transparent 80%);
                animation: fluid 15s infinite alternate;
                pointer-events: none;
                z-index: 5;
            }

            @keyframes fluid {
                0% { transform: translate(0, 0) scale(1); }
                100% { transform: translate(-3%, -3%) scale(1.05); }
            }

            .interface {
                position: relative;
                z-index: 20;
                display: flex;
                width: 100%;
                height: 100%;
                color: white;
            }

            /* САЙДБАР */
            .sidebar {
                width: 280px;
                background: rgba(255, 255, 255, 0.03);
                backdrop-filter: blur(20px);
                border-right: 1px solid rgba(255, 255, 255, 0.1);
                padding: 25px 15px;
                display: flex;
                flex-direction: column;
                gap: 25px;
            }

            .logo-section {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 10px;
            }

            .logo {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .logo-icon {
                font-size: 28px;
                filter: drop-shadow(0 0 15px #4facfe);
            }

            .logo-text {
                font-size: 18px;
                font-weight: 600;
                background: linear-gradient(135deg, #fff, #a78bfa);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .status {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 12px;
                color: #10b981;
                background: rgba(16, 185, 129, 0.15);
                padding: 5px 10px;
                border-radius: 30px;
            }

            .dot {
                width: 8px;
                height: 8px;
                background: #10b981;
                border-radius: 50%;
                animation: pulse 2s infinite;
            }

            .new-chat-btn {
                background: rgba(79, 172, 254, 0.2);
                border: 1px solid rgba(79, 172, 254, 0.4);
                border-radius: 40px;
                padding: 15px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                font-size: 16px;
                cursor: pointer;
                transition: all 0.3s;
            }

            .new-chat-btn:hover {
                background: rgba(79, 172, 254, 0.3);
                transform: translateY(-2px);
                box-shadow: 0 10px 30px rgba(79, 172, 254, 0.3);
            }

            .chats-history {
                flex: 1;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .chat-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 15px;
                background: rgba(255, 255, 255, 0.02);
                border: 1px solid rgba(255, 255, 255, 0.05);
                border-radius: 30px;
                cursor: pointer;
                transition: all 0.3s;
            }

            .chat-item:hover {
                background: rgba(79, 172, 254, 0.15);
                transform: translateX(5px);
                border-color: rgba(79, 172, 254, 0.3);
            }

            .chat-item.active {
                background: rgba(79, 172, 254, 0.2);
                border-color: rgba(79, 172, 254, 0.5);
            }

            .chat-icon {
                width: 35px;
                height: 35px;
                background: linear-gradient(135deg, #4facfe, #a855f7);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
            }

            .chat-item-info {
                flex: 1;
            }

            .chat-item-title {
                font-size: 14px;
                font-weight: 500;
                margin-bottom: 3px;
            }

            .chat-item-preview {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.5);
            }

            .user-section {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 15px;
                background: rgba(255, 255, 255, 0.05);
                border-radius: 40px;
            }

            .user-avatar {
                width: 45px;
                height: 45px;
                background: linear-gradient(135deg, #f43f5e, #fb7185);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 22px;
            }

            .user-info {
                flex: 1;
            }

            .user-name {
                font-weight: 600;
                font-size: 14px;
                margin-bottom: 3px;
            }

            .user-plan {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.6);
            }

            .settings {
                width: 35px;
                height: 35px;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                font-size: 18px;
            }

            /* ОБЛАСТЬ ЧАТА */
            .chat-area {
                flex: 1;
                display: flex;
                flex-direction: column;
                padding: 25px;
            }

            .chat-header {
                padding-bottom: 20px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }

            .chat-title {
                font-size: 24px;
                font-weight: 600;
                margin-bottom: 5px;
            }

            .chat-model {
                font-size: 13px;
                color: #4facfe;
                background: rgba(79, 172, 254, 0.15);
                display: inline-block;
                padding: 4px 12px;
                border-radius: 30px;
            }

            .messages {
                flex: 1;
                overflow-y: auto;
                padding: 20px 0;
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .message {
                display: flex;
                gap: 15px;
                animation: messageIn 0.3s ease-out;
            }

            @keyframes messageIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }

            .message.user {
                flex-direction: row-reverse;
            }

            .message-avatar {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                flex-shrink: 0;
            }

            .message.user .message-avatar {
                background: linear-gradient(135deg, #8b5cf6, #ec4899);
            }

            .message.assistant .message-avatar {
                background: linear-gradient(135deg, #4facfe, #00f2fe);
            }

            .message-content {
                max-width: 70%;
                padding: 15px 20px;
                border-radius: 25px;
                position: relative;
            }

            .message.user .message-content {
                background: rgba(139, 92, 246, 0.15);
                border: 1px solid rgba(139, 92, 246, 0.3);
                border-bottom-right-radius: 5px;
            }

            .message.assistant .message-content {
                background: rgba(79, 172, 254, 0.15);
                border: 1px solid rgba(79, 172, 254, 0.3);
                border-bottom-left-radius: 5px;
            }

            .message-text {
                font-size: 15px;
                line-height: 1.6;
                white-space: pre-wrap;
            }

            .message-time {
                font-size: 10px;
                color: rgba(255, 255, 255, 0.4);
                margin-top: 8px;
                text-align: right;
            }

            /* ИНПУТ */
            .input-container {
                padding-top: 20px;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }

            .suggestions {
                display: flex;
                gap: 10px;
                margin-bottom: 15px;
                flex-wrap: wrap;
            }

            .suggestion {
                padding: 8px 16px;
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 30px;
                font-size: 13px;
                color: rgba(255, 255, 255, 0.7);
                cursor: pointer;
                transition: all 0.3s;
            }

            .suggestion:hover {
                background: rgba(79, 172, 254, 0.15);
                border-color: rgba(79, 172, 254, 0.4);
                transform: translateY(-2px);
            }

            .input-wrapper {
                display: flex;
                align-items: flex-end;
                gap: 15px;
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 40px;
                padding: 15px 25px;
            }

            .message-input {
                flex: 1;
                background: transparent;
                border: none;
                color: white;
                font-size: 16px;
                resize: none;
                max-height: 200px;
                outline: none;
                font-family: inherit;
            }

            .send-btn {
                width: 45px;
                height: 45px;
                background: linear-gradient(135deg, #4facfe, #00f2fe);
                border: none;
                border-radius: 50%;
                color: white;
                font-size: 20px;
                cursor: pointer;
                transition: all 0.3s;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .send-btn:hover {
                transform: scale(1.1);
                box-shadow: 0 0 30px #4facfe;
            }

            .api-status {
                margin-top: 10px;
                font-size: 12px;
                color: #10b981;
                text-align: center;
                padding: 5px;
            }

            /* СКРОЛЛ */
            .messages::-webkit-scrollbar,
            .chats-history::-webkit-scrollbar {
                width: 4px;
            }

            .messages::-webkit-scrollbar-track,
            .chats-history::-webkit-scrollbar-track {
                background: rgba(255, 255, 255, 0.02);
            }

            .messages::-webkit-scrollbar-thumb,
            .chats-history::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.2);
                border-radius: 4px;
            }
        </style>
    </div>

    <script>
        // DeepSeek API Configuration
        const DEEPSEEK_API_KEY = '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'; // Ваш API ключ
        const API_URL = 'https://api.deepseek.com/v1/chat/completions';

        // Элементы интерфейса
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const chatsHistory = document.getElementById('chatsHistory');
        const suggestions = document.querySelectorAll('.suggestion');
        const apiStatus = document.getElementById('apiStatus');

        // Состояние приложения
        let currentChatId = Date.now();
        let chats = JSON.parse(localStorage.getItem('deepseek_chats')) || [];
        let messages = [];

        // Инициализация
        function init() {
            loadChats();
            addWelcomeMessage();
            updateAPIStatus();
        }

        // Проверка API статуса
        function updateAPIStatus() {
            if (DEEPSEEK_API_KEY && DEEPSEEK_API_KEY !== 'YOUR_API_KEY_HERE') {
                apiStatus.innerHTML = '✅ DeepSeek API подключен';
                apiStatus.style.color = '#10b981';
            } else {
                apiStatus.innerHTML = '⚠️ Вставьте ваш API ключ DeepSeek';
                apiStatus.style.color = '#f59e0b';
            }
        }

        // Загрузка чатов
        function loadChats() {
            chatsHistory.innerHTML = '';
            chats.forEach(chat => {
                addChatToHistory(chat);
            });
        }

        // Добавление чата в историю
        function addChatToHistory(chat) {
            const chatItem = document.createElement('div');
            chatItem.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
            chatItem.innerHTML = `
                <div class="chat-icon">💬</div>
                <div class="chat-item-info">
                    <div class="chat-item-title">${chat.title || 'Новый чат'}</div>
                    <div class="chat-item-preview">${chat.preview || 'Начните разговор...'}</div>
                </div>
            `;
            chatItem.onclick = () => switchChat(chat.id);
            chatsHistory.appendChild(chatItem);
        }

        // Переключение чата
        function switchChat(chatId) {
            currentChatId = chatId;
            const chat = chats.find(c => c.id === chatId);
            if (chat) {
                messages = chat.messages || [];
                displayMessages();
            }
            loadChats();
        }

        // Приветственное сообщение
        function addWelcomeMessage() {
            if (messages.length === 0) {
                addMessage('assistant', 'Привет! Я DeepSeek с интерфейсом из жидкого стекла. Задавай любые вопросы! 🌊');
            }
        }

        // Добавление сообщения
        function addMessage(role, content) {
            messages.push({
                role: role,
                content: content,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            
            displayMessages();
            saveChat();
        }

        // Отображение сообщений
        function displayMessages() {
            messagesContainer.innerHTML = '';
            messages.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.role}`;
                messageDiv.innerHTML = `
                    <div class="message-avatar">${msg.role === 'assistant' ? '🧠' : '👤'}</div>
                    <div class="message-content">
                        <div class="message-text">${msg.content.replace(/\n/g, '<br>')}</div>
                        <div class="message-time">${msg.time}</div>
                    </div>
                `;
                messagesContainer.appendChild(messageDiv);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Сохранение чата
        function saveChat() {
            const chatIndex = chats.findIndex(c => c.id === currentChatId);
            const preview = messages[messages.length - 1]?.content.substring(0, 30) + '...' || 'Новый чат';
            const title = messages[0]?.content.substring(0, 20) || 'Новый чат';
            
            if (chatIndex >= 0) {
                chats[chatIndex].messages = messages;
                chats[chatIndex].preview = preview;
                chats[chatIndex].title = title;
            } else {
                chats.push({
                    id: currentChatId,
                    title: title,
                    preview: preview,
                    messages: messages
                });
            }
            
            localStorage.setItem('deepseek_chats', JSON.stringify(chats));
            loadChats();
        }

        // Создание нового чата
        function newChat() {
            currentChatId = Date.now();
            messages = [];
            addWelcomeMessage();
            loadChats();
        }

        // Отправка запроса к DeepSeek API
        async function sendToDeepSeek(userMessage) {
            if (!DEEPSEEK_API_KEY || DEEPSEEK_API_KEY === 'YOUR_API_KEY_HERE') {
                addMessage('assistant', '⚠️ Пожалуйста, вставьте ваш API ключ DeepSeek в переменную DEEPSEEK_API_KEY');
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            { role: 'system', content: 'Ты DeepSeek AI с интерфейсом из жидкого стекла. Отвечай кратко и по делу.' },
                            ...messages.map(m => ({ role: m.role, content: m.content }))
                        ],
                        temperature: 0.7,
                        max_tokens: 1000
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ошибка! статус: ${response.status}`);
                }

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                addMessage('assistant', aiResponse);

            } catch (error) {
                console.error('Ошибка API:', error);
                addMessage('assistant', '❌ Ошибка подключения к DeepSeek API. Проверьте API ключ и попробуйте снова.');
            }
        }

        // Обработка отправки сообщения
        async function handleSend() {
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            messageInput.value = '';
            messageInput.style.height = 'auto';

            await sendToDeepSeek(text);
        }

        // Event Listeners
        sendBtn.addEventListener('click', handleSend);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
        });

        newChatBtn.addEventListener('click', newChat);

        suggestions.forEach(suggestion => {
            suggestion.addEventListener('click', () => {
                messageInput.value = suggestion.textContent;
                messageInput.style.height = 'auto';
                messageInput.style.height = messageInput.scrollHeight + 'px';
            });
        });

        // Параллакс эффект
        document.addEventListener('mousemove', (e) => {
            const glass = document.querySelector('.liquid-glass');
            const x = (e.clientX / window.innerWidth - 0.5) * 15;
            const y = (e.clientY / window.innerHeight - 0.5) * 15;
            
            glass.style.transform = `rotateY(${x}deg) rotateX(${-y}deg) translateZ(10px)`;
        });

        // Инициализация приложения
        init();

        // Генерация жидких частиц
        function createLiquidParticles() {
            const overlay = document.querySelector('.fluid-overlay');
            for (let i = 0; i < 5; i++) {
                const drop = document.createElement('div');
                drop.style.position = 'absolute';
                drop.style.width = Math.random() * 200 + 100 + 'px';
                drop.style.height = drop.style.width;
                drop.style.background = 'radial-gradient(circle at 30% 30%, rgba(79,172,254,0.2), transparent 70%)';
                drop.style.borderRadius = '50%';
                drop.style.filter = 'blur(20px)';
                drop.style.top = Math.random() * 100 + '%';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.animation = `float ${Math.random() * 10 + 10}s infinite alternate`;
                overlay.appendChild(drop);
            }
        }

        createLiquidParticles();
    </script>
</body>
</html>
