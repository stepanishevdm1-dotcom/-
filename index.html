<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Glass</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ПРОЗРАЧНЫЙ ИНТЕРФЕЙС */
        .glass-container {
            width: 1400px;
            max-width: 100%;
            height: 900px;
            max-height: 95vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* ЛЕВАЯ ПАНЕЛЬ */
        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            color: white;
            font-size: 20px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        .new-chat {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 15px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .new-chat:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-item {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            color: white;
        }

        /* ОСНОВНОЙ ЧАТ */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
        }

        .chat-header {
            padding: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .chat-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .chat-status {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 15px;
            color: white;
            max-width: 80%;
        }

        .message.user {
            flex-direction: row-reverse;
            margin-left: auto;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .bubble {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            line-height: 1.5;
        }

        .message.user .bubble {
            background: rgba(255, 255, 255, 0.1);
        }

        .input-area {
            padding: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 10px 20px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 12px 0;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        button {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .suggestions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .suggestion {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }

        .suggestion:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .api-status {
            text-align: center;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        /* СКРОЛЛ */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <!-- САЙДБАР -->
        <div class="sidebar">
            <div class="logo">
                <span>🧠</span>
                <span>DeepSeek</span>
            </div>

            <div class="new-chat" id="newChatBtn">
                <span>+</span>
                <span>Новый чат</span>
            </div>

            <div class="chats-list" id="chatsList"></div>

            <div class="user-profile">
                <div class="avatar" style="background: rgba(255,255,255,0.2);">👤</div>
                <div style="flex: 1;">
                    <div style="font-weight: 600;">User</div>
                    <div style="font-size: 12px; opacity: 0.6;">glass mode</div>
                </div>
            </div>
        </div>

        <!-- ЧАТ -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-title">DeepSeek Assistant</div>
                <div class="chat-status">прозрачный интерфейс · активен</div>
            </div>

            <div class="messages" id="messages"></div>

            <div class="input-area">
                <div class="suggestions">
                    <span class="suggestion">Напиши код</span>
                    <span class="suggestion">Переведи текст</span>
                    <span class="suggestion">Объясни</span>
                    <span class="suggestion">Идеи</span>
                </div>
                <div class="input-wrapper">
                    <textarea 
                        id="messageInput" 
                        placeholder="Спроси DeepSeek..."
                        rows="1"
                    ></textarea>
                    <button id="sendBtn">📤</button>
                </div>
                <div class="api-status" id="apiStatus">⚡ DeepSeek API готов</div>
            </div>
        </div>
    </div>

    <script>
        // DeepSeek API Configuration - ВАШ КЛЮЧ
        const DEEPSEEK_API_KEY = 'sk-d2142d4a4a9b40caa5e26889e1340c0b';
        const API_URL = 'https://api.deepseek.com/v1/chat/completions';

        // Элементы
        const messagesEl = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const chatsList = document.getElementById('chatsList');
        const apiStatus = document.getElementById('apiStatus');

        // Состояние
        let messages = [];
        let chats = JSON.parse(localStorage.getItem('chats')) || [];

        // Загрузка
        function init() {
            updateAPIStatus();
            loadChats();
            addWelcomeMessage();
        }

        function updateAPIStatus() {
            if (DEEPSEEK_API_KEY) {
                apiStatus.textContent = '✅ DeepSeek API подключен';
                apiStatus.style.color = '#4ade80';
            }
        }

        function loadChats() {
            chatsList.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.textContent = chat.title || 'Чат';
                chatsList.appendChild(div);
            });
        }

        function addWelcomeMessage() {
            if (messages.length === 0) {
                addMessage('assistant', 'Привет! Я DeepSeek в прозрачном интерфейсе. Спрашивай что угодно!');
            }
        }

        function addMessage(role, content) {
            messages.push({
                role: role,
                content: content
            });
            displayMessages();
            saveChat();
        }

        function displayMessages() {
            messagesEl.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.role}`;
                div.innerHTML = `
                    <div class="avatar">${msg.role === 'assistant' ? '🧠' : '👤'}</div>
                    <div class="bubble">${msg.content.replace(/\n/g, '<br>')}</div>
                `;
                messagesEl.appendChild(div);
            });
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function saveChat() {
            const lastMsg = messages[messages.length - 1]?.content || '';
            const chat = {
                id: Date.now(),
                title: lastMsg.substring(0, 20),
                messages: messages
            };
            
            if (chats.length === 0 || chats[0]?.id !== chat.id) {
                chats.unshift(chat);
                if (chats.length > 10) chats.pop();
                localStorage.setItem('chats', JSON.stringify(chats));
                loadChats();
            }
        }

        async function sendToDeepSeek(text) {
            try {
                addMessage('assistant', '⚡ печатает...');

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            { role: 'system', content: 'Ты DeepSeek. Отвечай кратко и по делу.' },
                            ...messages.map(m => ({ role: m.role, content: m.content }))
                        ]
                    })
                });

                // Удаляем "печатает..."
                messages.pop();

                if (!response.ok) throw new Error('Ошибка API');

                const data = await response.json();
                addMessage('assistant', data.choices[0].message.content);

            } catch (error) {
                messages.pop();
                addMessage('assistant', '❌ Ошибка. Проверь API ключ.');
                console.error(error);
            }
        }

        // Обработчики
        sendBtn.addEventListener('click', async () => {
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            messageInput.value = '';
            messageInput.style.height = 'auto';

            await sendToDeepSeek(text);
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
        });

        newChatBtn.addEventListener('click', () => {
            messages = [];
            addWelcomeMessage();
        });

        document.querySelectorAll('.suggestion').forEach(s => {
            s.addEventListener('click', () => {
                messageInput.value = s.textContent;
            });
        });

        // Запуск
        init();
    </script>
</body>
</html>
