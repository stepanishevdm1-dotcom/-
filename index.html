<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram в ЖИДКОМ СТЕКЛЕ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* КРАСИВЫЙ ТЕКУЧИЙ ФОН */
        .psychedelic-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, #ff0066, transparent 40%),
                radial-gradient(circle at 80% 70%, #00ffff, transparent 40%),
                radial-gradient(circle at 40% 80%, #ffff00, transparent 40%),
                radial-gradient(circle at 60% 20%, #ff00ff, transparent 40%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 20px, transparent 20px, transparent 40px);
            animation: bgFlow 20s infinite alternate;
            filter: blur(40px);
        }

        @keyframes bgFlow {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(20deg) scale(1.3); }
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР С УГРОБНЫМИ ИСКАЖЕНИЯМИ */
        .warp-container {
            position: relative;
            width: 380px;
            height: 780px;
            z-index: 10;
            filter: url(#heavy-warp);
        }

        /* СУМАСШЕДШИЙ SVG ФИЛЬТР */
        <svg style="position: absolute; width: 0; height: 0;">
            <filter id="heavy-warp" x="-50%" y="-50%" width="200%" height="200%">
                <!-- ДИКИЙ ШУМ ДЛЯ ТЕКУЧЕСТИ -->
                <feTurbulence baseFrequency="0.05 0.1" numOctaves="5" seed="666" result="turb"/>
                <!-- СДВИГ ПИКСЕЛЕЙ КАК БЕШЕНЫЙ -->
                <feDisplacementMap in="SourceGraphic" in2="turb" scale="25" xChannelSelector="R" yChannelSelector="G" result="warped"/>
                <!-- РАЗМЫТИЕ ДЛЯ МЯГКОСТИ -->
                <feGaussianBlur in="warped" stdDeviation="3" result="blurred"/>
                <!-- ПОВЫШЕНИЕ КОНТРАСТА ДО УГРОБНОСТИ -->
                <feColorMatrix in="blurred" mode="saturate" values="3" result="saturated"/>
                <!-- СМЕШИВАНИЕ С ОРИГИНАЛОМ ДЛЯ СОХРАНЕНИЯ ДЕТАЛЕЙ -->
                <feBlend in="SourceGraphic" in2="saturated" mode="screen"/>
            </filter>
        </svg>

        <!-- ТЕЛЕФОН ИЗ ЖИДКОГО СТЕКЛА -->
        <div class="liquid-phone">
            <!-- ОСНОВНОЙ СЛОЙ ЖИДКОСТИ -->
            <div class="fluid-layer"></div>
            
            <!-- ИСКАЖАЮЩИЕ КРАЯ -->
            <div class="warp-edges"></div>
            
            <!-- БЕШЕНЫЕ КАПЛИ -->
            <div class="crazy-drops">
                <div class="crazy-drop" style="--delay: 0s; --size: 200px; --top: 10%; --left: 20%;"></div>
                <div class="crazy-drop" style="--delay: 2s; --size: 250px; --top: 60%; --left: 70%;"></div>
                <div class="crazy-drop" style="--delay: 4s; --size: 180px; --top: 30%; --left: 50%;"></div>
                <div class="crazy-drop" style="--delay: 1s; --size: 300px; --top: 80%; --left: 10%;"></div>
                <div class="crazy-drop" style="--delay: 3s; --size: 220px; --top: 40%; --left: 80%;"></div>
                <div class="crazy-drop" style="--delay: 5s; --size: 280px; --top: 15%; --left: 60%;"></div>
            </div>
            
            <!-- УЛЬТРАПРОЗРАЧНЫЙ ЭКРАН -->
            <div class="ultra-glass">
                <!-- СТАТУС БАР -->
                <div class="status-bar-fancy">
                    <span>📶 5G+</span>
                    <span class="time-fancy" id="liveTime"></span>
                    <span>🔋 100%</span>
                </div>
                
                <!-- ПРОФИЛЬ -->
                <div class="profile-fancy">
                    <div class="avatar-liquid">
                        <div class="avatar-inner">A</div>
                    </div>
                    <div class="profile-text">
                        <div class="name-fancy">Алексей</div>
                        <div class="status-fancy">🤙 был 5 минут назад</div>
                    </div>
                    <div class="menu-dots">⋮</div>
                </div>
                
                <!-- ПОИСК -->
                <div class="search-fancy">
                    <span>🔍</span>
                    <input type="text" placeholder="Поиск разговоров..." class="search-input-fancy">
                </div>
                
                <!-- ЧАТЫ С ПРОЗРАЧНОСТЬЮ -->
                <div class="chats-fancy">
                    <div class="chat-item-fancy">
                        <div class="chat-avatar-fancy" style="background: linear-gradient(135deg, #ff0066, #ff6600);">
                            M
                            <span class="online-liquid"></span>
                        </div>
                        <div class="chat-content-fancy">
                            <div class="chat-header-fancy">
                                <span class="chat-name-fancy">Михаил</span>
                                <span class="chat-time-fancy">12:30</span>
                            </div>
                            <div class="chat-message-fancy">
                                <span>Йоу, смотри че нашел! 🔥</span>
                                <span class="badge-fancy">3</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="chat-item-fancy">
                        <div class="chat-avatar-fancy" style="background: linear-gradient(135deg, #0066ff, #00ffff);">
                            А
                        </div>
                        <div class="chat-content-fancy">
                            <div class="chat-header-fancy">
                                <span class="chat-name-fancy">Анна</span>
                                <span class="chat-time-fancy">11:15</span>
                            </div>
                            <div class="chat-message-fancy">
                                <span>Фото 📸 (5 новых)</span>
                                <span class="badge-fancy">5</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="chat-item-fancy">
                        <div class="chat-avatar-fancy" style="background: linear-gradient(135deg, #9900ff, #ff00ff);">
                            Р
                            <span class="online-liquid"></span>
                        </div>
                        <div class="chat-content-fancy">
                            <div class="chat-header-fancy">
                                <span class="chat-name-fancy">Рабочий чат</span>
                                <span class="chat-time-fancy">10:45</span>
                            </div>
                            <div class="chat-message-fancy">
                                <span>Дмитрий: Планерка в 15:00</span>
                                <span class="badge-fancy">12</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="chat-item-fancy">
                        <div class="chat-avatar-fancy" style="background: linear-gradient(135deg, #00ff99, #00ccff);">
                            С
                        </div>
                        <div class="chat-content-fancy">
                            <div class="chat-header-fancy">
                                <span class="chat-name-fancy">Семья</span>
                                <span class="chat-time-fancy">09:20</span>
                            </div>
                            <div class="chat-message-fancy">
                                <span>Мама: Ужин готов! 🍝</span>
                                <span class="badge-fancy">2</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="chat-item-fancy">
                        <div class="chat-avatar-fancy" style="background: linear-gradient(135deg, #ff6600, #ffcc00);">
                            Д
                            <span class="online-liquid"></span>
                        </div>
                        <div class="chat-content-fancy">
                            <div class="chat-header-fancy">
                                <span class="chat-name-fancy">Димон</span>
                                <span class="chat-time-fancy">Вчера</span>
                            </div>
                            <div class="chat-message-fancy">
                                <span>Го в доту?</span>
                                <span></span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- НИЖНЕЕ МЕНЮ -->
                <div class="nav-fancy">
                    <div class="nav-item-fancy active">💬</div>
                    <div class="nav-item-fancy">👥</div>
                    <div class="nav-item-fancy">📞</div>
                    <div class="nav-item-fancy">⚙️</div>
                </div>
            </div>
            
            <!-- СВЕЧЕНИЕ -->
            <div class="glow-fancy"></div>
        </div>
    </div>

    <style>
        /* ОСНОВНОЙ ТЕЛЕФОН */
        .liquid-phone {
            position: relative;
            width: 380px;
            height: 780px;
            border-radius: 80px;
            overflow: hidden;
            box-shadow: 
                0 50px 100px rgba(0, 0, 0, 0.8),
                0 0 0 3px rgba(255, 255, 255, 0.2) inset,
                0 0 100px rgba(0, 255, 255, 0.3) inset;
            transform-style: preserve-3d;
            animation: phoneFloat 10s infinite ease-in-out;
        }

        @keyframes phoneFloat {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            25% { transform: rotate(2deg) translateY(-15px); }
            75% { transform: rotate(-2deg) translateY(15px); }
        }

        /* ЖИДКИЙ СЛОЙ (основной эффект воды) */
        .fluid-layer {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 30% 40%, 
                rgba(255, 255, 255, 0.3) 0%, 
                rgba(0, 200, 255, 0.2) 30%,
                rgba(150, 0, 255, 0.2) 60%,
                transparent 80%);
            mix-blend-mode: overlay;
            pointer-events: none;
            z-index: 30;
            animation: fluidMove 15s infinite alternate;
            filter: blur(10px);
        }

        @keyframes fluidMove {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            25% { transform: translate(-5%, -5%) scale(1.1) rotate(5deg); }
            50% { transform: translate(5%, 5%) scale(0.9) rotate(-5deg); }
            75% { transform: translate(-5%, 5%) scale(1.05) rotate(3deg); }
            100% { transform: translate(5%, -5%) scale(0.95) rotate(-3deg); }
        }

        /* ИСКАЖАЮЩИЕСЯ КРАЯ */
        .warp-edges {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 80px;
            box-shadow: 
                inset 30px 30px 70px rgba(255, 255, 255, 0.4),
                inset -30px -30px 70px rgba(0, 0, 0, 0.4),
                inset 70px 0 100px rgba(0, 200, 255, 0.3),
                inset -70px 0 100px rgba(255, 0, 200, 0.3),
                inset 0 70px 100px rgba(200, 255, 0, 0.2),
                inset 0 -70px 100px rgba(0, 255, 200, 0.2);
            pointer-events: none;
            z-index: 40;
            mix-blend-mode: soft-light;
            animation: edgeWarp 8s infinite;
        }

        @keyframes edgeWarp {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; box-shadow: inset 50px 50px 100px rgba(255,255,255,0.5), inset -50px -50px 100px rgba(0,0,0,0.5); }
        }

        /* БЕШЕНЫЕ КАПЛИ */
        .crazy-drops {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            overflow: hidden;
            border-radius: 80px;
        }

        .crazy-drop {
            position: absolute;
            width: var(--size);
            height: var(--size);
            top: var(--top);
            left: var(--left);
            background: radial-gradient(circle at 30% 30%, 
                rgba(255, 255, 255, 0.7) 0%, 
                rgba(100, 200, 255, 0.4) 40%,
                rgba(150, 100, 255, 0.2) 70%,
                transparent 90%);
            border-radius: 60% 40% 70% 30% / 40% 60% 30% 70%;
            filter: blur(8px) drop-shadow(0 0 30px rgba(0, 200, 255, 0.5));
            transform: rotateX(30deg) rotateY(20deg);
            animation: crazyDropMove 12s infinite alternate;
            animation-delay: var(--delay);
        }

        @keyframes crazyDropMove {
            0% { 
                transform: rotateX(30deg) rotateY(20deg) scale(1); 
                border-radius: 60% 40% 70% 30% / 40% 60% 30% 70%;
            }
            25% { 
                transform: rotateX(40deg) rotateY(30deg) scale(1.1) translate(20px, -20px);
                border-radius: 40% 60% 30% 70% / 60% 40% 70% 30%;
            }
            50% { 
                transform: rotateX(20deg) rotateY(10deg) scale(0.9) translate(-20px, 20px);
                border-radius: 70% 30% 60% 40% / 30% 70% 40% 60%;
            }
            75% { 
                transform: rotateX(50deg) rotateY(40deg) scale(1.05) translate(10px, 10px);
                border-radius: 30% 70% 40% 60% / 70% 30% 60% 40%;
            }
            100% { 
                transform: rotateX(30deg) rotateY(20deg) scale(1) translate(0, 0);
                border-radius: 60% 40% 70% 30% / 40% 60% 30% 70%;
            }
        }

        /* УЛЬТРАПРОЗРАЧНЫЙ ЭКРАН */
        .ultra-glass {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 25, 0.15);
            backdrop-filter: blur(30px) brightness(1.5);
            -webkit-backdrop-filter: blur(30px) brightness(1.5);
            border-radius: 80px;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            color: white;
            z-index: 20;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.5) inset;
        }

        /* СТАТУС БАР */
        .status-bar-fancy {
            display: flex;
            justify-content: space-between;
            padding: 5px 15px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 10px rgba(0,200,255,0.5);
        }

        .time-fancy {
            font-weight: 700;
        }

        /* ПРОФИЛЬ */
        .profile-fancy {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar-liquid {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.5);
            animation: avatarLiquid 5s infinite;
        }

        @keyframes avatarLiquid {
            0%, 100% { border-radius: 50%; }
            25% { border-radius: 40% 60% 30% 70% / 60% 40% 70% 30%; }
            50% { border-radius: 70% 30% 60% 40% / 30% 70% 40% 60%; }
            75% { border-radius: 30% 70% 40% 60% / 70% 30% 60% 40%; }
        }

        .avatar-inner {
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        .profile-text {
            flex: 1;
        }

        .name-fancy {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(0,200,255,0.7);
        }

        .status-fancy {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
        }

        .menu-dots {
            font-size: 30px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transform: rotate(90deg);
        }

        /* ПОИСК */
        .search-fancy {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 15px 25px;
            backdrop-filter: blur(20px);
            font-size: 18px;
        }

        .search-input-fancy {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            width: 100%;
            outline: none;
        }

        .search-input-fancy::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-style: italic;
        }

        /* ЧАТЫ */
        .chats-fancy {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 5px;
        }

        .chat-item-fancy {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .chat-item-fancy:hover {
            background: rgba(79, 172, 254, 0.2);
            border-color: rgba(79, 172, 254, 0.5);
            transform: translateX(15px) scale(1.03);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .chat-avatar-fancy {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            position: relative;
            flex-shrink: 0;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .online-liquid {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: #4ade80;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 20px #4ade80;
            animation: onlineLiquid 2s infinite;
        }

        @keyframes onlineLiquid {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.5); filter: blur(2px); }
        }

        .chat-content-fancy {
            flex: 1;
        }

        .chat-header-fancy {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .chat-name-fancy {
            font-weight: 700;
            font-size: 16px;
        }

        .chat-time-fancy {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .chat-message-fancy {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .badge-fancy {
            background: linear-gradient(135deg, #ff0066, #ff6600);
            color: white;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255,0,102,0.5);
        }

        /* НАВИГАЦИЯ */
        .nav-fancy {
            display: flex;
            justify-content: space-around;
            padding: 15px 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 60px;
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 10px;
        }

        .nav-item-fancy {
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.5);
            font-size: 24px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .nav-item-fancy:hover {
            color: #00ffff;
            transform: translateY(-8px) scale(1.1);
            text-shadow: 0 0 30px #00ffff;
        }

        .nav-item-fancy.active {
            color: #00ffff;
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 5px 30px rgba(0, 255, 255, 0.4);
        }

        /* СВЕЧЕНИЕ */
        .glow-fancy {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 80px;
            box-shadow: 0 0 150px rgba(0, 255, 255, 0.4);
            animation: glowPulseFancy 3s infinite;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes glowPulseFancy {
            0%, 100% { opacity: 0.3; box-shadow: 0 0 150px rgba(0, 255, 255, 0.4); }
            50% { opacity: 0.8; box-shadow: 0 0 200px rgba(255, 0, 255, 0.6); }
        }

        /* СКРОЛЛ */
        .chats-fancy::-webkit-scrollbar {
            width: 4px;
        }

        .chats-fancy::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .chats-fancy::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
    </style>

    <script>
        // ЖИВОЕ ВРЕМЯ
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('liveTime').textContent = `${hours}:${minutes}`;
        }
        
        updateTime();
        setInterval(updateTime, 1000);

        // ДИКИЙ ПАРАЛЛАКС
        document.addEventListener('mousemove', (e) => {
            const phone = document.querySelector('.liquid-phone');
            const fluid = document.querySelector('.fluid-layer');
            
            const x = (e.clientX / window.innerWidth - 0.5) * 40;
            const y = (e.clientY / window.innerHeight - 0.5) * 40;
            
            phone.style.transform = `rotateY(${x}deg) rotateX(${-y}deg) translateZ(30px)`;
            fluid.style.transform = `translateX(${x*2}px) translateY(${y*2}px) scale(1.1)`;
        });

        // ДОБАВЛЯЕМ ЕЩЕ КАПЕЛЬ
        function addMoreDrops() {
            const dropsContainer = document.querySelector('.crazy-drops');
            for (let i = 0; i < 10; i++) {
                const drop = document.createElement('div');
                drop.className = 'crazy-drop';
                drop.style.setProperty('--delay', Math.random() * 8 + 's');
                drop.style.setProperty('--size', Math.random() * 250 + 150 + 'px');
                drop.style.setProperty('--top', Math.random() * 100 + '%');
                drop.style.setProperty('--left', Math.random() * 100 + '%');
                dropsContainer.appendChild(drop);
            }
        }
        
        addMoreDrops();
    </script>
</body>
</html>
