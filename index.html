<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR Hand</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Courier New',monospace; }

#vid {
  position:fixed; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  /* NO mirror transform - rear camera natural */
}
#cv {
  position:fixed; inset:0;
  width:100%; height:100%;
  pointer-events:none;
}

#hud {
  position:fixed; top:0; left:0; right:0; z-index:20;
  padding:14px 18px 10px;
  background:linear-gradient(180deg,rgba(0,0,0,.8) 0%,transparent 100%);
  display:flex; align-items:center; justify-content:space-between;
  pointer-events:none;
}
#logo { color:#00ffcc; font-size:13px; letter-spacing:5px; font-weight:bold; }
#srow { display:flex; align-items:center; gap:8px; }
#dot  { width:8px; height:8px; border-radius:50%; background:#444; }
#dot.on  { background:#00ffcc; box-shadow:0 0 8px #00ffcc; }
#dot.err { background:#ff4444; box-shadow:0 0 8px #ff4444; }
#stxt { font-size:11px; color:rgba(255,255,255,.5); letter-spacing:1px; }

#hints {
  position:fixed; bottom:0; left:0; right:0; z-index:20;
  padding:12px 10px 18px;
  background:linear-gradient(0deg,rgba(0,0,0,.85) 0%,transparent 100%);
  display:flex; flex-wrap:wrap; gap:7px; justify-content:center;
  pointer-events:none;
}
.h {
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:20px; padding:5px 11px; font-size:11px;
  color:rgba(255,255,255,.6); letter-spacing:.4px;
}

#flash {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:30; pointer-events:none;
  font-size:22px; font-weight:bold; letter-spacing:4px;
  opacity:0; transition:opacity .15s;
}
#flash.show { opacity:1; }

#yt { position:fixed; inset:0; z-index:50; display:none; flex-direction:column; background:#0f0f0f; }
#yt.open { display:flex; }
#ytbar { background:#1a1a1a; border-bottom:1px solid #333; padding:10px 16px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
#ytbar b { color:#fff; font-size:14px; letter-spacing:1px; flex:1; }
#ytbar span { color:rgba(255,255,255,.3); font-size:11px; }
#ytf { flex:1; border:none; width:100%; }

#loader {
  position:fixed; inset:0; z-index:100; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
}
#lt { font-size:26px; font-weight:bold; color:#00ffcc; letter-spacing:6px; text-shadow:0 0 30px #00ffcc; }
#ls { font-size:11px; color:rgba(255,255,255,.4); letter-spacing:3px; }
#lb-o { width:200px; height:2px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; }
#lb-i { height:100%; width:0%; background:#00ffcc; box-shadow:0 0 6px #00ffcc; transition:width .35s; }
#lm { font-size:11px; color:rgba(255,255,255,.35); letter-spacing:1px; text-align:center; padding:0 24px; min-height:30px; }
#retry-btn {
  display:none; background:#00ffcc; color:#000; border:none;
  padding:12px 28px; font-size:13px; font-weight:bold; letter-spacing:3px;
  border-radius:30px; cursor:pointer; font-family:'Courier New',monospace;
}

.scanline {
  position:fixed; left:0; right:0; height:1px; top:-1px; z-index:15;
  background:linear-gradient(90deg,transparent,rgba(0,255,204,.3),transparent);
  animation:scan 4s linear infinite; pointer-events:none;
}
@keyframes scan { to { top:100vh; } }
</style>
</head>
<body>

<div id="loader">
  <div id="lt">AR HAND</div>
  <div id="ls">GESTURE INTERFACE</div>
  <div id="lb-o"><div id="lb-i"></div></div>
  <div id="lm">Загрузка…</div>
  <button id="retry-btn" onclick="location.reload()">ПЕРЕЗАГРУЗИТЬ</button>
</div>

<video id="vid" playsinline autoplay muted></video>
<canvas id="cv"></canvas>
<div class="scanline"></div>

<div id="hud">
  <div id="logo">AR·HAND</div>
  <div id="srow"><div id="dot"></div><span id="stxt">СТАРТ</span></div>
</div>

<div id="hints">
  <div class="h">☝️ указательный = курсор</div>
  <div class="h">✌️ два пальца (держи) = YouTube</div>
  <div class="h">🤏 щипок = клик</div>
  <div class="h">✊ кулак (держи) = закрыть</div>
</div>

<div id="flash"></div>

<div id="yt">
  <div id="ytbar"><b>▶ YOUTUBE</b><span>✊ держи кулак — закрыть</span></div>
  <iframe id="ytf" src="about:blank" allow="autoplay;encrypted-media" allowfullscreen></iframe>
</div>

<!-- TF + MediaPipe Hands (NON-module CDN build, works in local HTML on Android Chrome) -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.11.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.11.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>

<script>
// ── refs ──────────────────────────────────────────────────────────────────────
const vid   = document.getElementById('vid');
const cv    = document.getElementById('cv');
const ctx   = cv.getContext('2d');
const dot   = document.getElementById('dot');
const stxt  = document.getElementById('stxt');
const flash = document.getElementById('flash');
const lbI   = document.getElementById('lb-i');
const lm    = document.getElementById('lm');
const loader= document.getElementById('loader');
const ytEl  = document.getElementById('yt');
const ytF   = document.getElementById('ytf');

// ── helpers ───────────────────────────────────────────────────────────────────
function setLoad(pct, msg){ lbI.style.width=pct+'%'; lm.textContent=msg; }

let flt;
function showFlash(txt, col){
  flash.textContent=txt;
  flash.style.color=col||'#00ffcc';
  flash.style.textShadow='0 0 24px '+(col||'#00ffcc');
  flash.classList.add('show');
  clearTimeout(flt); flt=setTimeout(()=>flash.classList.remove('show'),1000);
}

function resize(){ cv.width=window.innerWidth; cv.height=window.innerHeight; }
window.addEventListener('resize', resize); resize();

// ── YouTube ───────────────────────────────────────────────────────────────────
var ytOpen = false;
function openYT(){
  ytF.src='https://m.youtube.com/';
  ytEl.classList.add('open'); ytOpen=true;
  showFlash('▶ YOUTUBE','#ff0000');
}
function closeYT(){
  ytEl.classList.remove('open'); ytF.src='about:blank'; ytOpen=false;
  showFlash('✕ ЗАКРЫТО','#00ffcc');
}

// ── Skeleton drawing ──────────────────────────────────────────────────────────
// MediaPipe Hands gives 21 landmarks normalized [0..1]
// x=0 is LEFT of the VIDEO frame — since rear camera, no flip needed

var FC = ['#ff9933','#00ffcc','#33ddff','#bb66ff','#ff55aa'];
var FSEG = [
  {s:[[0,1],[1,2],[2,3],[3,4]],        c:'#ff9933'},
  {s:[[0,5],[5,6],[6,7],[7,8]],         c:'#00ffcc'},
  {s:[[5,9],[9,10],[10,11],[11,12]],    c:'#33ddff'},
  {s:[[9,13],[13,14],[14,15],[15,16]], c:'#bb66ff'},
  {s:[[13,17],[17,18],[18,19],[19,20]],c:'#ff55aa'},
];
var PALM=[[0,17],[5,9],[9,13],[13,17]];
var TIPS=[4,8,12,16,20];
var MCPS=[1,5,9,13,17];

function pt(lms,i){
  return { x: lms[i].x * cv.width, y: lms[i].y * cv.height };
}

function drawHand(lms, gest){
  ctx.clearRect(0,0,cv.width,cv.height);

  // 1. glow blobs
  ctx.save(); ctx.globalAlpha=0.13; ctx.lineCap='round';
  FSEG.forEach(function(f){
    ctx.strokeStyle=f.c; ctx.lineWidth=14; ctx.shadowColor=f.c; ctx.shadowBlur=24;
    f.s.forEach(function(ab){
      var pa=pt(lms,ab[0]),pb=pt(lms,ab[1]);
      ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
    });
  }); ctx.restore();

  // 2. palm lines
  ctx.save(); ctx.lineCap='round';
  PALM.forEach(function(ab){
    var pa=pt(lms,ab[0]),pb=pt(lms,ab[1]);
    ctx.strokeStyle='rgba(0,255,200,0.22)'; ctx.lineWidth=0.7; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
  });

  // 3. bone lines
  FSEG.forEach(function(f){
    f.s.forEach(function(ab){
      var pa=pt(lms,ab[0]),pb=pt(lms,ab[1]);
      // white ghost
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.4; ctx.shadowBlur=0;
      ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
      // color core
      ctx.strokeStyle=f.c; ctx.lineWidth=0.8; ctx.shadowColor=f.c; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
    });
  }); ctx.restore();

  // 4. joints
  ctx.save();
  for(var i=0;i<21;i++){
    var p=pt(lms,i);
    var col = i<=4?FC[0]:i<=8?FC[1]:i<=12?FC[2]:i<=16?FC[3]:FC[4];

    if(TIPS.indexOf(i)>=0){
      ctx.shadowColor=col; ctx.shadowBlur=18;
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(p.x,p.y,4.5,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=0.9; ctx.shadowBlur=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,7.5,0,Math.PI*2); ctx.stroke();
    } else if(i===0){
      ctx.strokeStyle=col; ctx.lineWidth=1.2; ctx.shadowColor=col; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(p.x,p.y,7,0,Math.PI*2); ctx.stroke();
      ctx.lineWidth=0.5;
      ctx.beginPath(); ctx.arc(p.x,p.y,11,0,Math.PI*2); ctx.stroke();
    } else if(MCPS.indexOf(i)>=0){
      ctx.strokeStyle=col; ctx.lineWidth=1.1; ctx.shadowColor=col; ctx.shadowBlur=7;
      ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='rgba(0,0,0,0.4)';
      ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=4; ctx.globalAlpha=0.85;
      ctx.beginPath(); ctx.arc(p.x,p.y,2.2,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
    }
  }
  ctx.restore();

  // 5. pinch dash
  if(gest==='PINCH'){
    var t=pt(lms,4), ix=pt(lms,8);
    ctx.save();
    ctx.strokeStyle='#ff4444'; ctx.lineWidth=1.2;
    ctx.setLineDash([5,4]); ctx.shadowColor='#ff4444'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.moveTo(t.x,t.y); ctx.lineTo(ix.x,ix.y); ctx.stroke();
    ctx.restore();
  }

  // 6. hold progress bar (bottom)
  if((gest==='PEACE'||gest==='FIST') && holdG===gest){
    var pct=Math.min(1,(Date.now()-holdStart)/HOLD_MS);
    var bc=gest==='PEACE'?'#ffe44d':'#ff6633';
    var bw=cv.width*0.55, bh=7, bx=(cv.width-bw)/2, by=cv.height-100;
    ctx.save();
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,4); ctx.fill();
    ctx.fillStyle=bc; ctx.shadowColor=bc; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.roundRect(bx,by,bw*pct,bh,4); ctx.fill();
    ctx.restore();
  }
}

// ── Gesture ───────────────────────────────────────────────────────────────────
function dst(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }

function fingerUp(lms,tip,dip,mcp){
  var w=lms[0];
  return dst(lms[tip],w)>dst(lms[dip],w) && dst(lms[tip],w)>dst(lms[mcp],w);
}

function getGest(lms){
  var idx   = fingerUp(lms,8,7,5);
  var mid   = fingerUp(lms,12,11,9);
  var ring  = fingerUp(lms,16,15,13);
  var pinky = fingerUp(lms,20,19,17);
  var pinch = dst(lms[4],lms[8]) < 0.08;

  if(!idx&&!mid&&!ring&&!pinky) return 'FIST';
  if(idx&&mid&&!ring&&!pinky)   return 'PEACE';
  if(idx&&!mid&&!ring&&!pinky&&pinch) return 'PINCH';
  if(idx&&!mid&&!ring&&!pinky)  return 'POINT';
  return 'OTHER';
}

// ── Hold ──────────────────────────────────────────────────────────────────────
var holdG='', holdStart=0, lastTrig=0;
var HOLD_MS=700;

function tryTrigger(g){
  var now=Date.now();
  if(g!==holdG){ holdG=g; holdStart=now; return; }
  if(now-holdStart>=HOLD_MS && now-lastTrig>1500){
    lastTrig=now;
    if(g==='PEACE'&&!ytOpen) openYT();
    if(g==='FIST'&&ytOpen)   closeYT();
    if(g==='PINCH') showFlash('● PINCH','#ff4444');
  }
}

// ── MediaPipe Hands setup ─────────────────────────────────────────────────────
var hands;

function initHands(){
  hands = new Hands({locateFile: function(f){
    return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/'+f;
  }});

  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 0,          // 0=lite, faster on mobile
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5
  });

  hands.onResults(function(res){
    ctx.clearRect(0,0,cv.width,cv.height);

    if(res.multiHandLandmarks && res.multiHandLandmarks.length>0){
      var lms  = res.multiHandLandmarks[0];
      var gest = getGest(lms);
      drawHand(lms, gest);
      tryTrigger(gest);
      dot.className='on'; stxt.textContent=gest;
    } else {
      dot.className=''; stxt.textContent='НЕТ РУКИ'; holdG='';
    }
  });
}

// ── Camera + loop ─────────────────────────────────────────────────────────────
var camera;

function startLoop(){
  // Use @mediapipe/camera_utils for clean frame pumping
  // Fallback: manual requestAnimationFrame
  var lastT=0;

  function sendFrame(ts){
    requestAnimationFrame(sendFrame);
    if(vid.readyState<2||vid.paused) return;
    if(ts-lastT < 33) return; // ~30fps cap
    lastT=ts;
    hands.send({image:vid}).catch(function(){});
  }
  requestAnimationFrame(sendFrame);
}

async function startCamera(){
  var constraints={
    video:{
      facingMode:{exact:'environment'},
      width:{ideal:1280}, height:{ideal:720}
    },
    audio:false
  };
  try{
    var s=await navigator.mediaDevices.getUserMedia(constraints);
    vid.srcObject=s;
    await new Promise(function(r){ vid.onloadedmetadata=r; });
    await vid.play();
  } catch(e){
    // fallback without exact facingMode
    var s2=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
    vid.srcObject=s2;
    await new Promise(function(r){ vid.onloadedmetadata=r; });
    await vid.play();
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async function(){
  try{
    setLoad(20,'Инициализация MediaPipe…');
    initHands();

    setLoad(50,'Прогрев модели…');
    // Warm up by loading (first call triggers WASM download)
    await hands.initialize();

    setLoad(75,'Включение камеры…');
    await startCamera();

    setLoad(100,'Готово!');
    setTimeout(function(){
      loader.style.display='none';
      startLoop();
    },300);

  } catch(err){
    setLoad(0,'Ошибка: '+err.message);
    lm.style.color='#ff6666';
    dot.className='err';
    stxt.textContent='ОШИБКА';
    document.getElementById('retry-btn').style.display='block';
    console.error(err);
  }
})();
</script>
</body>
</html>
