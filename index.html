<!DOCTYPE html>
<html>
<head>
    <title>Моё MAX-облако</title>
    <meta charset="utf-8">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px; 
            background: #f0f2f5; 
        }
        h1 { 
            color: #2688eb; 
            text-align: center;
        }
        .description {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .upload-box { 
            background: white; 
            border: 2px dashed #2688eb; 
            padding: 40px; 
            text-align: center; 
            border-radius: 10px; 
            margin: 20px 0; 
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-box:hover {
            background: #f0f8ff;
            border-color: #1a6eb8;
        }
        .file-list { 
            margin-top: 30px; 
        }
        .file-item { 
            background: white; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .file-name {
            font-weight: bold;
            color: #2688eb;
            text-decoration: none;
            font-size: 16px;
        }
        .file-name:hover {
            text-decoration: underline;
        }
        .file-size {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        button { 
            background: #2688eb; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 6px; 
            font-size: 16px; 
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover { 
            background: #1a6eb8; 
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .success {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>☁️ Моё MAX-облако</h1>
    <div class="description">
        Файлы хранятся в MAX/VK • Лимит 4 ГБ на файл • GitHub версия
    </div>
    
    <div id="message"></div>
    
    <!-- Для загрузки через API нужно отдельное решение -->
    <div style="text-align: center; padding: 20px; background: #fff3e0; border-radius: 8px; margin: 20px 0;">
        <p>⚠️ GitHub Pages не поддерживает прямую загрузку файлов через API</p>
        <p>Но ты можешь <b>просматривать и скачивать</b> свои файлы!</p>
    </div>
    
    <div class="file-list" id="fileList">
        <h3>📄 Загрузка списка файлов...</h3>
    </div>
    
    <script>
        const VK_TOKEN = 'vk1.a.r1EMRoy8jxXaDeBj7ZfD3fNDPhnJ-yQSUUP4TlOT_TM6eE39tB-xfJihwOf5oefW9F-CwWIsZE8L7T6Eth3Kuy_5m6D6CNf-8N-Va1eFk0j8yVR2XOKvlvcv7GZtssaqvOoeQrMktBnmGXH4ONxLRgRuvl8qzyVF0lYee3T9j0rQ7VCOUjd_RvOH_SXk_izijYXtRZHHZ55TDFs8Lmpe6w';
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = `<div class="${type}">${text}</div>`;
            setTimeout(() => msgDiv.innerHTML = '', 5000);
        }
        
        // Загружаем список файлов через JSONP (обход CORS)
        function loadFileList() {
            const listDiv = document.getElementById('fileList');
            listDiv.innerHTML = '<h3>📄 Загрузка списка файлов...</h3>';
            
            // Создаем скрипт для JSONP запроса
            const script = document.createElement('script');
            const callbackName = 'vkCallback' + Math.random().toString(36).substr(2, 5);
            
            window[callbackName] = function(data) {
                if (data.error) {
                    listDiv.innerHTML = `<h3>❌ Ошибка: ${data.error.error_msg}</h3>`;
                } else {
                    displayFiles(data.response);
                }
                delete window[callbackName];
                document.body.removeChild(script);
            };
            
            script.src = `https://api.vk.com/method/docs.get?access_token=${VK_TOKEN}&v=5.131&callback=${callbackName}`;
            document.body.appendChild(script);
        }
        
        function displayFiles(response) {
            const listDiv = document.getElementById('fileList');
            const files = response.items;
            
            if (files.length === 0) {
                listDiv.innerHTML = '<h3>📄 У тебя пока нет файлов в MAX</h3>';
                return;
            }
            
            let html = '<h3>📄 Мои файлы:</h3>';
            files.forEach(file => {
                const sizeMB = (file.size / 1024 / 1024).toFixed(2);
                const date = new Date(file.date * 1000).toLocaleString();
                
                html += `
                    <div class="file-item">
                        <a href="${file.url}" class="file-name" target="_blank">${file.title}</a>
                        <div class="file-size">${sizeMB} МБ</div>
                        <div class="file-size">Добавлен: ${date}</div>
                    </div>
                `;
            });
            
            listDiv.innerHTML = html;
        }
        
        // Загружаем файлы при старте
        window.onload = loadFileList;
    </script>
</body>
</html>
