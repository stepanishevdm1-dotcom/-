<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Video Stabilizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
        }
        
        #videoCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        
        #debugInfo {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.9rem;
            z-index: 20;
            backdrop-filter: blur(5px);
            border: 1px solid #0f03;
        }
        
        .controls-panel {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 30;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.15);
            min-width: 250px;
        }
        
        .control-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .control-label {
            color: #fff;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
        }
        
        input[type=range] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #2a6a8a, #8ac4ff);
            border-radius: 10px;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            border: 2px solid #4a90e2;
            cursor: pointer;
        }
        
        .value-badge {
            color: #8ac4ff;
            font-weight: 600;
        }
        
        #permission-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        
        .permission-btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            margin: 20px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <canvas id="videoCanvas"></canvas>
    
    <div id="permission-overlay">
        <h2 style="color: white; margin-bottom: 20px;">🎥 Стабилизатор видео</h2>
        <p style="color: #ccc; margin-bottom: 30px;">Нужен доступ к камере</p>
        <button class="permission-btn" id="requestCameraBtn">📷 Включить камеру</button>
    </div>

    <div id="debugInfo">
        ⏳ Анализ видео...
    </div>

    <div class="controls-panel">
        <div class="control-row">
            <div class="control-label">
                <span>🔍 Приближение (зум)</span>
                <span id="zoomValue" class="value-badge">2.0x</span>
            </div>
            <input type="range" id="zoomSlider" min="1.2" max="3.0" step="0.1" value="2.0">
        </div>
        <div class="control-label" style="margin-top: 10px; color: #aaa; font-size: 0.8rem;">
            ⚡ Стабилизация: сглаживание движений
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('videoCanvas');
            const ctx = canvas.getContext('2d');
            const debugDiv = document.getElementById('debugInfo');
            const overlay = document.getElementById('permission-overlay');
            
            // Видео элемент
            const video = document.createElement('video');
            video.autoplay = true;
            video.playsInline = true;
            video.muted = true;
            
            // Состояние
            let videoStream = null;
            let cameraActive = false;
            
            // Параметры стабилизации
            let zoom = 2.0; // приближение по умолчанию
            
            // Для стабилизации (сглаживание движений)
            let prevFrameData = null;
            let offsetX = 0;
            let offsetY = 0;
            let targetOffsetX = 0;
            let targetOffsetY = 0;
            
            // Размеры
            let videoWidth = 1280;
            let videoHeight = 720;
            
            // Размер canvas
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            // Запрос камеры
            async function requestCamera() {
                try {
                    const constraints = {
                        video: {
                            facingMode: 'environment',
                            width: { ideal: 1920 },
                            height: { ideal: 1080 }
                        },
                        audio: false
                    };
                    
                    videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                    video.srcObject = videoStream;
                    
                    await new Promise((resolve) => {
                        video.onplaying = () => {
                            videoWidth = video.videoWidth;
                            videoHeight = video.videoHeight;
                            console.log('Видео размер:', videoWidth, videoHeight);
                            resolve();
                        };
                        video.play();
                    });
                    
                    cameraActive = true;
                    overlay.style.display = 'none';
                    
                    // Запускаем стабилизацию
                    requestAnimationFrame(stabilizeFrame);
                    
                } catch (err) {
                    console.error('Ошибка камеры:', err);
                    alert('Не удалось получить доступ к камере');
                }
            }
            
            // Функция стабилизации
            function stabilizeFrame() {
                if (!cameraActive || video.readyState < 2) {
                    requestAnimationFrame(stabilizeFrame);
                    return;
                }
                
                // Создаем временный canvas для анализа текущего кадра
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                
                // Уменьшаем размер для анализа (для производительности)
                const analyzeWidth = 80;
                const analyzeHeight = 60;
                
                tempCanvas.width = analyzeWidth;
                tempCanvas.height = analyzeHeight;
                
                // Рисуем текущий кадр уменьшенным
                tempCtx.drawImage(video, 0, 0, analyzeWidth, analyzeHeight);
                
                // Получаем данные пикселей
                const currentFrameData = tempCtx.getImageData(0, 0, analyzeWidth, analyzeHeight);
                
                // Если есть предыдущий кадр - сравниваем
                if (prevFrameData) {
                    // Ищем смещение между кадрами
                    const offset = findOffset(prevFrameData, currentFrameData, analyzeWidth, analyzeHeight);
                    
                    // Плавно применяем смещение (сглаживание)
                    targetOffsetX += offset.x * 0.5; // накапливаем смещение
                    targetOffsetY += offset.y * 0.5;
                    
                    // Ограничиваем максимальное смещение
                    targetOffsetX = Math.max(-30, Math.min(30, targetOffsetX));
                    targetOffsetY = Math.max(-30, Math.min(30, targetOffsetY));
                    
                    // Плавно двигаемся к целевому смещению
                    offsetX += (targetOffsetX - offsetX) * 0.1;
                    offsetY += (targetOffsetY - offsetY) * 0.1;
                    
                    debugDiv.innerHTML = `📊 Стабилизация: ${Math.abs(offset.x).toFixed(1)}px | Зум: ${zoom.toFixed(1)}x`;
                }
                
                // Сохраняем текущий кадр для следующего сравнения
                prevFrameData = currentFrameData;
                
                // Отрисовываем стабилизированное видео
                renderStabilizedVideo();
                
                requestAnimationFrame(stabilizeFrame);
            }
            
            // Поиск смещения между двумя кадрами
            function findOffset(frame1, frame2, width, height) {
                let bestX = 0;
                let bestY = 0;
                let bestDiff = Infinity;
                
                // Ищем смещение в небольшом диапазоне (для скорости)
                const searchRange = 8;
                
                for (let dy = -searchRange; dy <= searchRange; dy += 2) {
                    for (let dx = -searchRange; dx <= searchRange; dx += 2) {
                        let diff = 0;
                        let pixelsCompared = 0;
                        
                        // Сравниваем пиксели со смещением
                        for (let y = 4; y < height - 4; y++) {
                            for (let x = 4; x < width - 4; x++) {
                                const nx = x + dx;
                                const ny = y + dy;
                                
                                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                    const i1 = (y * width + x) * 4;
                                    const i2 = (ny * width + nx) * 4;
                                    
                                    // Разница по яркости (используем только зеленый канал для скорости)
                                    const diff1 = Math.abs(frame1.data[i1] - frame2.data[i2]);
                                    diff += diff1;
                                    pixelsCompared++;
                                }
                            }
                        }
                        
                        const avgDiff = diff / pixelsCompared;
                        
                        if (avgDiff < bestDiff) {
                            bestDiff = avgDiff;
                            bestX = dx;
                            bestY = dy;
                        }
                    }
                }
                
                return { x: bestX, y: bestY };
            }
            
            // Отрисовка стабилизированного видео
            function renderStabilizedVideo() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save();
                
                // Центрируем
                ctx.translate(canvas.width / 2, canvas.height / 2);
                
                // Применяем зум (приближение)
                ctx.scale(zoom, zoom);
                
                // Применяем смещение для стабилизации (инвертируем, чтобы компенсировать движение)
                ctx.translate(-offsetX * 2, -offsetY * 2);
                
                // Рисуем видео
                const videoAspect = videoWidth / videoHeight;
                const canvasAspect = canvas.width / canvas.height;
                
                let drawWidth, drawHeight;
                if (videoAspect > canvasAspect) {
                    drawHeight = canvas.height;
                    drawWidth = drawHeight * videoAspect;
                } else {
                    drawWidth = canvas.width;
                    drawHeight = drawWidth / videoAspect;
                }
                
                ctx.drawImage(video, -drawWidth/2, -drawHeight/2, drawWidth, drawHeight);
                ctx.restore();
            }
            
            // UI обработчики
            document.getElementById('requestCameraBtn').addEventListener('click', requestCamera);
            
            const zoomSlider = document.getElementById('zoomSlider');
            const zoomValue = document.getElementById('zoomValue');
            
            zoomSlider.addEventListener('input', (e) => {
                zoom = parseFloat(e.target.value);
                zoomValue.textContent = zoom.toFixed(1) + 'x';
            });
            
            // Для Android запускаем автоматически
            if (!/iPad|iPhone|iPod/.test(navigator.userAgent)) {
                requestCamera();
            }
            
        })();
    </script>
</body>
</html>
