<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR File Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;}

#vid{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
#cv{position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}

/* ── AR floating window ── */
#arwin{
  position:fixed;z-index:10;
  display:none;flex-direction:column;
  border-radius:16px;overflow:hidden;
  border:1.5px solid rgba(0,255,204,0.3);
  box-shadow:0 0 40px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.06);
  background:rgba(8,8,8,0.88);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  transition:opacity .15s, border-color .15s;
  width:88vw;
}
#arwin.show{display:flex;}
/* Semi-transparent when dragging or resizing — hand skeleton visible through */
#arwin.moving{
  opacity:0.45;
  border-color:rgba(0,255,204,0.7);
  box-shadow:0 0 0 2px rgba(0,255,204,0.5),0 0 60px rgba(0,255,204,0.12);
}

/* Titlebar — drag zone */
#titlebar{
  display:flex;align-items:center;gap:8px;padding:9px 12px;
  background:rgba(12,12,12,0.95);
  border-bottom:1px solid rgba(255,255,255,0.07);
  flex-shrink:0;cursor:grab;user-select:none;touch-action:none;
}
.tdot{width:10px;height:10px;border-radius:50%;}
.tdot.r{background:#ff5f57;}.tdot.y{background:#febc2e;}.tdot.g{background:#28c840;}
#titlelabel{flex:1;text-align:center;font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#tbtn-close{background:none;border:none;color:rgba(255,255,255,0.3);font-size:16px;cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1;}

/* Video player */
#mediaplayer{
  width:100%;aspect-ratio:16/9;background:#000;flex-shrink:0;display:none;
  position:relative;
}
#mediaplayer video{width:100%;height:100%;display:block;background:#000;}

/* File picker */
#filepanel{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:rgba(10,10,10,0.6);min-height:80px;
}
#filepanel::-webkit-scrollbar{display:none;}

#pick-btn-wrap{padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px;}
#pick-btn{
  background:rgba(0,255,204,0.12);border:1.5px solid rgba(0,255,204,0.4);
  color:#00ffcc;border-radius:30px;padding:12px 28px;
  font-size:13px;font-weight:bold;letter-spacing:2px;cursor:pointer;
  font-family:'Courier New',monospace;width:100%;max-width:280px;
}
#pick-btn:active{background:rgba(0,255,204,0.22);}
#pick-hint{font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:1px;text-align:center;}
#file-input{display:none;}

/* File list */
#filelist{padding:0 0 8px;}
.fitem{
  display:flex;align-items:center;gap:10px;padding:11px 14px;
  border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;
  transition:background .1s;
}
.fitem:active{background:rgba(255,255,255,0.07);}
.fitem.playing{background:rgba(0,255,204,0.07);border-left:2px solid #00ffcc;}
.ficon{font-size:20px;flex-shrink:0;width:28px;text-align:center;}
.fname{flex:1;min-width:0;font-size:12px;color:rgba(255,255,255,0.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fdur{font-size:10px;color:rgba(255,255,255,0.3);flex-shrink:0;}

/* Resize handle — bottom-right corner */
#reshandle{
  position:absolute;bottom:0;right:0;
  width:36px;height:36px;cursor:se-resize;touch-action:none;
  display:flex;align-items:flex-end;justify-content:flex-end;padding:7px;z-index:11;
}
#reshandle svg{opacity:.25;}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:20;padding:14px 18px 10px;background:linear-gradient(180deg,rgba(0,0,0,.8)0%,transparent 100%);display:flex;align-items:center;justify-content:space-between;pointer-events:none;}
#logo{color:#00ffcc;font-size:13px;letter-spacing:5px;font-weight:bold;}
#srow{display:flex;align-items:center;gap:8px;}
#dot{width:8px;height:8px;border-radius:50%;background:#444;transition:background .2s,box-shadow .2s;}
#dot.on{background:#00ffcc;box-shadow:0 0 8px #00ffcc;}
#dot.err{background:#ff4444;box-shadow:0 0 8px #ff4444;}
#stxt{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:1px;}

/* ── Hints ── */
#hints{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:12px 10px 18px;background:linear-gradient(0deg,rgba(0,0,0,.85)0%,transparent 100%);display:flex;flex-wrap:wrap;gap:7px;justify-content:center;pointer-events:none;transition:opacity .4s;}
#hints.hidden{opacity:0;}
.h{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:5px 11px;font-size:11px;color:rgba(255,255,255,.55);}

/* Hold bar */
#holdbar{position:fixed;z-index:25;pointer-events:none;bottom:86px;left:50%;transform:translateX(-50%);width:60vw;display:none;}
#holdtrack{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
#holdfill{height:100%;width:0%;border-radius:3px;}

/* Flash */
#flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;pointer-events:none;font-size:20px;font-weight:bold;letter-spacing:3px;opacity:0;transition:opacity .15s;}
#flash.show{opacity:1;}

/* Loader */
#loader{position:fixed;inset:0;z-index:100;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;}
#lt{font-size:24px;font-weight:bold;color:#00ffcc;letter-spacing:6px;text-shadow:0 0 30px #00ffcc;}
#ls{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:3px;}
#lb-o{width:200px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
#lb-i{height:100%;width:0%;background:#00ffcc;box-shadow:0 0 6px #00ffcc;transition:width .3s;}
#lm{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1px;text-align:center;padding:0 24px;min-height:28px;}
#retry-btn{display:none;background:#00ffcc;color:#000;border:none;padding:12px 28px;font-size:13px;font-weight:bold;letter-spacing:3px;border-radius:30px;cursor:pointer;font-family:'Courier New',monospace;}
.scanline{position:fixed;left:0;right:0;height:1px;top:-1px;z-index:15;background:linear-gradient(90deg,transparent,rgba(0,255,204,.25),transparent);animation:scan 4s linear infinite;pointer-events:none;}
@keyframes scan{to{top:100vh;}}
</style>
</head>
<body>

<div id="loader">
  <div id="lt">AR HAND</div>
  <div id="ls">FILE PLAYER</div>
  <div id="lb-o"><div id="lb-i"></div></div>
  <div id="lm">Загрузка…</div>
  <button id="retry-btn" onclick="location.reload()">ПЕРЕЗАГРУЗИТЬ</button>
</div>

<video id="vid" playsinline autoplay muted></video>
<canvas id="cv"></canvas>
<div class="scanline"></div>

<!-- AR File Player Window -->
<div id="arwin">
  <div id="titlebar">
    <div class="tdot r" id="tbtn-close"></div>
    <div class="tdot y"></div>
    <div class="tdot g"></div>
    <div id="titlelabel">◈ AR FILE PLAYER</div>
  </div>

  <div id="mediaplayer">
    <video id="playervid" controls playsinline></video>
  </div>

  <div id="filepanel">
    <div id="pick-btn-wrap">
      <button id="pick-btn" onclick="document.getElementById('file-input').click()">
        ＋ ВЫБРАТЬ ФАЙЛЫ
      </button>
      <div id="pick-hint">видео с телефона • mp4, mov, mkv…</div>
    </div>
    <div id="filelist"></div>
  </div>

  <!-- Resize handle -->
  <div id="reshandle">
    <svg width="14" height="14" viewBox="0 0 14 14">
      <path d="M2 12L12 2M7 12L12 7" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>

  <input id="file-input" type="file" accept="video/*,audio/*" multiple>
</div>

<div id="hud">
  <div id="logo">AR·HAND</div>
  <div id="srow"><div id="dot"></div><span id="stxt">СТАРТ</span></div>
</div>
<div id="hints">
  <div class="h">✌️ держи → открыть плеер</div>
  <div class="h">✊ держи → закрыть</div>
  <div class="h">тяни заголовок → двигать</div>
  <div class="h">тяни уголок → размер</div>
</div>
<div id="holdbar"><div id="holdtrack"><div id="holdfill"></div></div></div>
<div id="flash"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script>
// ─── File handling ────────────────────────────────────────────────────────────
var files = []; // {name, url, type}
var currentIdx = -1;

document.getElementById('file-input').addEventListener('change', function(e){
  var newFiles = Array.from(e.target.files);
  newFiles.forEach(function(f){
    var url = URL.createObjectURL(f);
    var type = f.type.startsWith('audio') ? 'audio' : 'video';
    files.push({name: f.name, url: url, type: type});
  });
  renderFileList();
  if(files.length === 1) playFile(0); // auto-play first
  this.value = '';
});

function renderFileList(){
  var list = document.getElementById('filelist');
  list.innerHTML = '';
  files.forEach(function(f, i){
    var item = document.createElement('div');
    item.className = 'fitem' + (i === currentIdx ? ' playing' : '');
    item.innerHTML =
      '<div class="ficon">' + (f.type==='audio'?'🎵':'🎬') + '</div>' +
      '<div class="fname">' + escHtml(f.name) + '</div>';
    item.addEventListener('click', function(){ playFile(i); });
    list.appendChild(item);
  });
}

function playFile(idx){
  if(idx < 0 || idx >= files.length) return;
  currentIdx = idx;
  var f = files[idx];
  var pv = document.getElementById('playervid');
  var mp = document.getElementById('mediaplayer');
  pv.src = f.url;
  pv.load();
  pv.play().catch(function(){});
  mp.style.display = 'block';
  document.getElementById('titlelabel').textContent = f.name;
  renderFileList();
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── AR window state ──────────────────────────────────────────────────────────
var arwin = document.getElementById('arwin');
var arX = 0, arY = 0, arW = 0;
var arOpen = false;

function openAR(){
  arW = Math.min(window.innerWidth * 0.9, 420);
  arX = (window.innerWidth - arW) / 2;
  arY = window.innerHeight * 0.1;
  applyPos();
  arwin.style.width = arW + 'px';
  arwin.classList.add('show');
  arOpen = true;
  document.getElementById('hints').classList.add('hidden');
  showFlash('◈ ФАЙЛЫ','#00ffcc');
}
function closeAR(){
  arwin.classList.remove('show');
  document.getElementById('playervid').pause();
  arOpen = false;
  document.getElementById('hints').classList.remove('hidden');
  showFlash('✕ ЗАКРЫТО','#00ffcc');
}
function applyPos(){
  arwin.style.left  = Math.round(arX) + 'px';
  arwin.style.top   = Math.round(arY) + 'px';
  arwin.style.width = Math.round(arW) + 'px';
}

document.getElementById('tbtn-close').addEventListener('click', closeAR);

// ─── Touch drag (titlebar) ────────────────────────────────────────────────────
var tb = document.getElementById('titlebar');
var dragOn=false, dTX=0, dTY=0, dOX=0, dOY=0;

tb.addEventListener('touchstart', function(e){
  e.preventDefault();
  dragOn=true; dTX=e.touches[0].clientX; dTY=e.touches[0].clientY; dOX=arX; dOY=arY;
  arwin.classList.add('moving');
},{passive:false});
document.addEventListener('touchmove', function(e){
  if(!dragOn) return; e.preventDefault();
  arX = dOX + (e.touches[0].clientX - dTX);
  arY = dOY + (e.touches[0].clientY - dTY);
  arX = Math.max(-arW*0.6, Math.min(window.innerWidth - arW*0.4, arX));
  arY = Math.max(0, Math.min(window.innerHeight - 50, arY));
  applyPos();
},{passive:false});
document.addEventListener('touchend', function(){ dragOn=false; arwin.classList.remove('moving'); });

// ─── Touch resize (corner handle) ────────────────────────────────────────────
var rh = document.getElementById('reshandle');
var resOn=false, rSX=0, rOW=0;
rh.addEventListener('touchstart', function(e){
  e.preventDefault(); e.stopPropagation();
  resOn=true; rSX=e.touches[0].clientX; rOW=arW;
  arwin.classList.add('moving');
},{passive:false});
document.addEventListener('touchmove', function(e){
  if(!resOn) return; e.preventDefault();
  arW = Math.max(220, Math.min(window.innerWidth*0.98, rOW + (e.touches[0].clientX - rSX)));
  applyPos();
},{passive:false});
document.addEventListener('touchend', function(){ resOn=false; arwin.classList.remove('moving'); });

// ─── Flash ────────────────────────────────────────────────────────────────────
var flt;
function showFlash(txt,col){
  var f=document.getElementById('flash');
  f.textContent=txt; f.style.color=col; f.style.textShadow='0 0 24px '+col;
  f.classList.add('show'); clearTimeout(flt);
  flt=setTimeout(function(){f.classList.remove('show');},1000);
}

// ─── Canvas ───────────────────────────────────────────────────────────────────
var cv=document.getElementById('cv'), ctx=cv.getContext('2d');
function resize(){ cv.width=window.innerWidth; cv.height=window.innerHeight; }
window.addEventListener('resize',resize); resize();

// ─── Skeleton ─────────────────────────────────────────────────────────────────
var FC=['#ff9933','#00ffcc','#33ddff','#bb66ff','#ff55aa'];
var FSEG=[
  {s:[[0,1],[1,2],[2,3],[3,4]],c:'#ff9933'},
  {s:[[0,5],[5,6],[6,7],[7,8]],c:'#00ffcc'},
  {s:[[5,9],[9,10],[10,11],[11,12]],c:'#33ddff'},
  {s:[[9,13],[13,14],[14,15],[15,16]],c:'#bb66ff'},
  {s:[[13,17],[17,18],[18,19],[19,20]],c:'#ff55aa'}
];
var PALM=[[0,17],[5,9],[9,13],[13,17]];
var TIPS=[4,8,12,16,20], MCPS=[1,5,9,13,17];

function pt(lms,i){return{x:lms[i].x*cv.width,y:lms[i].y*cv.height};}
function dst(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

function drawHand(lms,gest){
  ctx.clearRect(0,0,cv.width,cv.height);
  // glow blobs
  ctx.save(); ctx.globalAlpha=0.12; ctx.lineCap='round';
  FSEG.forEach(function(f){
    ctx.strokeStyle=f.c; ctx.lineWidth=14; ctx.shadowColor=f.c; ctx.shadowBlur=24;
    f.s.forEach(function(ab){var pa=pt(lms,ab[0]),pb=pt(lms,ab[1]);ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke();});
  }); ctx.restore();
  // palm
  ctx.save(); ctx.lineCap='round';
  PALM.forEach(function(ab){
    var pa=pt(lms,ab[0]),pb=pt(lms,ab[1]);
    ctx.strokeStyle='rgba(0,255,200,0.18)';ctx.lineWidth=0.7;ctx.shadowBlur=0;
    ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke();
  });
  // bones
  FSEG.forEach(function(f){
    f.s.forEach(function(ab){
      var pa=pt(lms,ab[0]),pb=pt(lms,ab[1]);
      ctx.strokeStyle='rgba(255,255,255,0.22)';ctx.lineWidth=1.3;ctx.shadowBlur=0;
      ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke();
      ctx.strokeStyle=f.c;ctx.lineWidth=0.75;ctx.shadowColor=f.c;ctx.shadowBlur=5;
      ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke();
    });
  }); ctx.restore();
  // joints
  ctx.save();
  for(var i=0;i<21;i++){
    var p=pt(lms,i);
    var col=i<=4?FC[0]:i<=8?FC[1]:i<=12?FC[2]:i<=16?FC[3]:FC[4];
    if(TIPS.indexOf(i)>=0){
      ctx.shadowColor=col;ctx.shadowBlur=18;ctx.fillStyle=col;
      ctx.beginPath();ctx.arc(p.x,p.y,4.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=0.9;ctx.shadowBlur=0;
      ctx.beginPath();ctx.arc(p.x,p.y,7.5,0,Math.PI*2);ctx.stroke();
    } else if(i===0){
      ctx.strokeStyle=col;ctx.lineWidth=1.2;ctx.shadowColor=col;ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(p.x,p.y,7,0,Math.PI*2);ctx.stroke();
      ctx.lineWidth=0.5;ctx.beginPath();ctx.arc(p.x,p.y,11,0,Math.PI*2);ctx.stroke();
    } else if(MCPS.indexOf(i)>=0){
      ctx.strokeStyle=col;ctx.lineWidth=1.1;ctx.shadowColor=col;ctx.shadowBlur=7;
      ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(0,0,0,0.35)';ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();
    } else {
      ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=4;ctx.globalAlpha=0.82;
      ctx.beginPath();ctx.arc(p.x,p.y,2.2,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    }
  }
  // pinch dash
  if(gest==='PINCH'){
    var t=pt(lms,4),ix=pt(lms,8);
    ctx.strokeStyle='#ff4444';ctx.lineWidth=1.2;ctx.setLineDash([5,4]);ctx.shadowColor='#ff4444';ctx.shadowBlur=12;
    ctx.beginPath();ctx.moveTo(t.x,t.y);ctx.lineTo(ix.x,ix.y);ctx.stroke();
  }
  ctx.restore();
}

// ─── Gesture ──────────────────────────────────────────────────────────────────
function fingerUp(lms,tip,dip,mcp){
  var w=lms[0];
  var dw=function(p){return Math.hypot(p.x-w.x,p.y-w.y);};
  return dw(lms[tip])>dw(lms[dip])&&dw(lms[tip])>dw(lms[mcp]);
}
function getGest(lms){
  var idx=fingerUp(lms,8,7,5),mid=fingerUp(lms,12,11,9),
      ring=fingerUp(lms,16,15,13),pinky=fingerUp(lms,20,19,17);
  var pinch=dst(lms[4],lms[8])<0.08;
  if(!idx&&!mid&&!ring&&!pinky) return 'FIST';
  if(idx&&mid&&!ring&&!pinky)   return 'PEACE';
  if(idx&&!mid&&!ring&&!pinky&&pinch) return 'PINCH';
  if(idx&&!mid&&!ring&&!pinky)  return 'POINT';
  return 'OTHER';
}

// ─── Hold ─────────────────────────────────────────────────────────────────────
var holdG='',holdStart=0,lastTrig=0,HOLD_MS=700;
var hb=document.getElementById('holdbar'),hf=document.getElementById('holdfill');

function tryTrigger(g){
  var now=Date.now();
  if(g!==holdG){holdG=g;holdStart=now;hb.style.display='none';return;}
  var needHold=(g==='PEACE'&&!arOpen)||(g==='FIST'&&arOpen);
  if(needHold){
    var pct=Math.min(1,(now-holdStart)/HOLD_MS);
    hb.style.display='block';
    var col=g==='PEACE'?'#00ffcc':'#ff6633';
    hf.style.background=col;hf.style.boxShadow='0 0 8px '+col;
    hf.style.width=(pct*100)+'%';
  } else {hb.style.display='none';}
  if(now-holdStart>=HOLD_MS&&now-lastTrig>1500){
    lastTrig=now;holdStart=now;hb.style.display='none';
    if(g==='PEACE'&&!arOpen) openAR();
    if(g==='FIST'&&arOpen)   closeAR();
  }
}

// ─── MediaPipe ────────────────────────────────────────────────────────────────
var camvid=document.getElementById('vid');
var dot=document.getElementById('dot'),stxt=document.getElementById('stxt');
var hands;

function initHands(){
  hands=new Hands({locateFile:function(f){
    return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/'+f;
  }});
  hands.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:0.6,minTrackingConfidence:0.5});
  hands.onResults(function(res){
    ctx.clearRect(0,0,cv.width,cv.height);
    if(res.multiHandLandmarks&&res.multiHandLandmarks.length>0){
      var lms=res.multiHandLandmarks[0];
      var g=getGest(lms);
      drawHand(lms,g);
      tryTrigger(g);
      dot.className='on';stxt.textContent=g;
    } else {
      dot.className='';stxt.textContent='НЕТ РУКИ';
      holdG='';hb.style.display='none';
    }
  });
}

async function startCamera(){
  var opts=[
    {video:{facingMode:{exact:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false},
    {video:{facingMode:'environment'},audio:false},
    {video:true,audio:false}
  ];
  for(var i=0;i<opts.length;i++){
    try{
      var s=await navigator.mediaDevices.getUserMedia(opts[i]);
      camvid.srcObject=s;
      return new Promise(function(r){camvid.onloadedmetadata=function(){camvid.play().then(r);};});
    }catch(e){}
  }
  throw new Error('Камера недоступна');
}

function startLoop(){
  var lastT=0;
  function frame(ts){
    requestAnimationFrame(frame);
    if(camvid.readyState<2||camvid.paused)return;
    if(ts-lastT<50)return; // 20fps
    lastT=ts;
    hands.send({image:camvid}).catch(function(){});
  }
  requestAnimationFrame(frame);
}

var loader=document.getElementById('loader'),lbI=document.getElementById('lb-i'),lmEl=document.getElementById('lm');
function setLoad(p,m){lbI.style.width=p+'%';lmEl.textContent=m;}

(async function(){
  try{
    setLoad(20,'Инициализация MediaPipe…');
    initHands();
    setLoad(50,'Загрузка модели рук…');
    await hands.initialize();
    setLoad(80,'Включение камеры…');
    await startCamera();
    setLoad(100,'Готово!');
    setTimeout(function(){loader.style.display='none';startLoop();},300);
  }catch(err){
    setLoad(0,'Ошибка: '+err.message);
    lmEl.style.color='#ff6666';
    dot.className='err';
    document.getElementById('retry-btn').style.display='block';
    console.error(err);
  }
})();
</script>
</body>
</html>
