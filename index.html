<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Real Stabilizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
        }
        
        #videoCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        
        #debugInfo {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #ffaa00;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.9rem;
            z-index: 20;
            backdrop-filter: blur(5px);
            border: 1px solid #ffaa0033;
        }
        
        .controls-panel {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 30;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.15);
            min-width: 250px;
        }
        
        .control-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .control-label {
            color: #fff;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
        }
        
        input[type=range] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #ffaa00, #ffdd88);
            border-radius: 10px;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            border: 2px solid #ffaa00;
            cursor: pointer;
        }
        
        .value-badge {
            color: #ffaa00;
            font-weight: 600;
        }
        
        #permission-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        
        .permission-btn {
            background: #ffaa00;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            margin: 20px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <canvas id="videoCanvas"></canvas>
    
    <div id="permission-overlay">
        <h2 style="color: white; margin-bottom: 20px;">🎥 Стабилизатор изображения</h2>
        <p style="color: #ccc; margin-bottom: 30px;">Убирает тряску рук в реальном времени</p>
        <button class="permission-btn" id="requestCameraBtn">📷 Включить камеру</button>
    </div>

    <div id="debugInfo">
        ⏳ Запуск...
    </div>

    <div class="controls-panel">
        <div class="control-row">
            <div class="control-label">
                <span>🔍 Приближение</span>
                <span id="zoomValue" class="value-badge">2.5x</span>
            </div>
            <input type="range" id="zoomSlider" min="1.5" max="4.0" step="0.1" value="2.5">
        </div>
        <div class="control-label" style="margin-top: 10px; color: #aaa; font-size: 0.8rem;">
            ⚡ Сглаживание: 90% (сильное)
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('videoCanvas');
            const ctx = canvas.getContext('2d');
            const debugDiv = document.getElementById('debugInfo');
            const overlay = document.getElementById('permission-overlay');
            
            // Видео
            const video = document.createElement('video');
            video.autoplay = true;
            video.playsInline = true;
            video.muted = true;
            
            // Состояние
            let videoStream = null;
            let cameraActive = false;
            
            // Параметры
            let zoom = 2.5; // сильное приближение чтобы скрыть края
            
            // СТАБИЛИЗАЦИЯ - сглаживание движений
            let smoothX = 0;
            let smoothY = 0;
            let targetX = 0;
            let targetY = 0;
            
            // Для анализа движения
            let prevFrameData = null;
            let prevTime = performance.now();
            
            // История движений для сглаживания (чем больше история, тем плавнее)
            const historySize = 15; // храним 15 последних смещений
            const historyX = [];
            const historyY = [];
            
            // Размеры
            let videoWidth = 1280;
            let videoHeight = 720;
            
            // Размер canvas
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            // Запрос камеры
            async function requestCamera() {
                try {
                    const constraints = {
                        video: {
                            facingMode: 'environment',
                            width: { ideal: 1920 },
                            height: { ideal: 1080 }
                        },
                        audio: false
                    };
                    
                    videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                    video.srcObject = videoStream;
                    
                    await new Promise((resolve) => {
                        video.onplaying = () => {
                            videoWidth = video.videoWidth;
                            videoHeight = video.videoHeight;
                            console.log('Видео размер:', videoWidth, videoHeight);
                            resolve();
                        };
                        video.play();
                    });
                    
                    cameraActive = true;
                    overlay.style.display = 'none';
                    
                    // Запускаем стабилизацию
                    requestAnimationFrame(stabilizeFrame);
                    
                } catch (err) {
                    console.error('Ошибка камеры:', err);
                    alert('Не удалось получить доступ к камере');
                }
            }
            
            // ГЛАВНАЯ ФУНКЦИЯ СТАБИЛИЗАЦИИ
            function stabilizeFrame() {
                if (!cameraActive || video.readyState < 2) {
                    requestAnimationFrame(stabilizeFrame);
                    return;
                }
                
                const currentTime = performance.now();
                const timeDelta = currentTime - prevTime;
                prevTime = currentTime;
                
                // Анализируем движение
                analyzeMotion();
                
                // Применяем сильное сглаживание (убирает тряску, оставляет плавные движения)
                applySmoothing();
                
                // Отрисовываем стабилизированное видео
                renderVideo();
                
                requestAnimationFrame(stabilizeFrame);
            }
            
            // Анализ движения между кадрами
            function analyzeMotion() {
                // Создаем маленькое изображение для анализа
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                
                const analyzeWidth = 64;  // очень маленькое для скорости
                const analyzeHeight = 48;
                
                tempCanvas.width = analyzeWidth;
                tempCanvas.height = analyzeHeight;
                
                // Рисуем текущий кадр
                tempCtx.drawImage(video, 0, 0, analyzeWidth, analyzeHeight);
                const currentData = tempCtx.getImageData(0, 0, analyzeWidth, analyzeHeight);
                
                if (prevFrameData) {
                    // Ищем смещение
                    const offset = findMotion(prevFrameData, currentData, analyzeWidth, analyzeHeight);
                    
                    // Добавляем в историю
                    historyX.push(offset.x);
                    historyY.push(offset.y);
                    
                    // Оставляем только последние historySize значений
                    if (historyX.length > historySize) {
                        historyX.shift();
                        historyY.shift();
                    }
                    
                    // Вычисляем целевое смещение (среднее за историю)
                    if (historyX.length > 0) {
                        let sumX = 0, sumY = 0;
                        for (let i = 0; i < historyX.length; i++) {
                            sumX += historyX[i];
                            sumY += historyY[i];
                        }
                        
                        // Целевое смещение - это СРЕДНЕЕ движение за последние кадры
                        // Это и есть стабилизация - мы следуем за общим трендом, но игнорируем резкие скачки
                        targetX = (sumX / historyX.length) * 3; // усиливаем для заметности
                        targetY = (sumY / historyY.length) * 3;
                    }
                }
                
                prevFrameData = currentData;
            }
            
            // Поиск движения между двумя кадрами
            function findMotion(frame1, frame2, width, height) {
                let bestX = 0;
                let bestY = 0;
                let bestDiff = Infinity;
                
                // Ищем в небольшом радиусе (для скорости)
                const searchRange = 6;
                
                for (let dy = -searchRange; dy <= searchRange; dy += 1) {
                    for (let dx = -searchRange; dx <= searchRange; dx += 1) {
                        let diff = 0;
                        let count = 0;
                        
                        // Сравниваем пиксели
                        for (let y = 4; y < height - 4; y++) {
                            for (let x = 4; x < width - 4; x++) {
                                const nx = x + dx;
                                const ny = y + dy;
                                
                                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                    const i1 = (y * width + x) * 4;
                                    const i2 = (ny * width + nx) * 4;
                                    
                                    // Используем яркость (R+G+B)/3 для простоты
                                    const b1 = (frame1.data[i1] + frame1.data[i1+1] + frame1.data[i1+2]) / 3;
                                    const b2 = (frame2.data[i2] + frame2.data[i2+1] + frame2.data[i2+2]) / 3;
                                    
                                    diff += Math.abs(b1 - b2);
                                    count++;
                                }
                            }
                        }
                        
                        const avgDiff = diff / count;
                        
                        if (avgDiff < bestDiff) {
                            bestDiff = avgDiff;
                            bestX = dx;
                            bestY = dy;
                        }
                    }
                }
                
                return { x: bestX, y: bestY };
            }
            
            // Применение сглаживания (это ключевая часть!)
            function applySmoothing() {
                // Очень сильное сглаживание (99% - убирает почти всю тряску)
                const smoothing = 0.95; // 0.95 = очень плавно, 0.8 = средне, 0.5 = быстро
                
                // Плавно двигаемся к цели
                smoothX += (targetX - smoothX) * (1 - smoothing);
                smoothY += (targetY - smoothY) * (1 - smoothing);
                
                // Ограничиваем максимальное смещение (чтобы не уехать слишком далеко)
                const maxOffset = 50;
                smoothX = Math.max(-maxOffset, Math.min(maxOffset, smoothX));
                smoothY = Math.max(-maxOffset, Math.min(maxOffset, smoothY));
            }
            
            // Отрисовка видео
            function renderVideo() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save();
                
                // Центрируем
                ctx.translate(canvas.width / 2, canvas.height / 2);
                
                // Приближение (чтобы не было черных краев)
                ctx.scale(zoom, zoom);
                
                // СТАБИЛИЗАЦИЯ: двигаем видео в противоположную сторону движения
                // Если рука движется вправо, видео двигаем влево и т.д.
                ctx.translate(-smoothX, -smoothY);
                
                // Рисуем видео
                const videoAspect = videoWidth / videoHeight;
                const canvasAspect = canvas.width / canvas.height;
                
                let drawWidth, drawHeight;
                if (videoAspect > canvasAspect) {
                    drawHeight = canvas.height;
                    drawWidth = drawHeight * videoAspect;
                } else {
                    drawWidth = canvas.width;
                    drawHeight = drawWidth / videoAspect;
                }
                
                ctx.drawImage(video, -drawWidth/2, -drawHeight/2, drawWidth, drawHeight);
                ctx.restore();
                
                // Отладочная информация
                debugDiv.innerHTML = `🎯 Стабилизация: активна (${(smoothX).toFixed(1)}px, ${(smoothY).toFixed(1)}px) | Зум: ${zoom.toFixed(1)}x | История: ${historyX.length}`;
            }
            
            // UI обработчики
            document.getElementById('requestCameraBtn').addEventListener('click', requestCamera);
            
            const zoomSlider = document.getElementById('zoomSlider');
            const zoomValue = document.getElementById('zoomValue');
            
            zoomSlider.addEventListener('input', (e) => {
                zoom = parseFloat(e.target.value);
                zoomValue.textContent = zoom.toFixed(1) + 'x';
            });
            
            // Для Android запускаем автоматически
            if (!/iPad|iPhone|iPod/.test(navigator.userAgent)) {
                requestCamera();
            }
            
        })();
    </script>
</body>
</html>
